<style>
:root{
  --bg:#F0EEE6; --panel:#FAF9F5; --panel2:#E7E4D8; --line:#DCD7C9; --line2:#C9C3B1;
  --ink:#1F1E1D; --soft:#5C5850; --faint:#8E897D;
  --acc:#B4552D; --acc2:#D97757; --accbg:rgba(217,119,87,.09);
  --gA:#3F6B4F; --gB:#38695F; --gC:#8A6A26; --gD:#A03D2E;
  --rad:8px;
}
[data-theme="dark"]{
  --bg:#1E1D1B; --panel:#262521; --panel2:#2E2C27; --line:#3A3832; --line2:#4B4840;
  --ink:#EDEAE1; --soft:#B5B0A4; --faint:#807B6F;
  --acc:#E8926F; --acc2:#D97757; --accbg:rgba(217,119,87,.14);
  --gA:#7FAE90; --gB:#7AADA4; --gC:#C9A75C; --gD:#CF7D6C;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:calc(16.5px * var(--uz,1)); line-height:1.62;
  min-height:100vh; padding-bottom:calc(84px + env(safe-area-inset-bottom));
}
.ar{font-family:'Amiri','Scheherazade New','Noto Naskh Arabic','Traditional Arabic','Geeza Pro',serif; direction:rtl; text-align:right;}
.wrap{max-width:720px; margin:0 auto; padding:0 18px;}
svg.i{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; flex:0 0 auto;}

/* ---- header ---- */
header.top{position:sticky; top:0; z-index:40; background:var(--bg); border-bottom:1px solid var(--line); padding:9px 0;}
.topline{display:flex; align-items:center; justify-content:space-between; max-width:720px; margin:0 auto; padding:0 14px 0 10px; gap:6px;}
.lead{display:flex; align-items:center; gap:2px; min-width:0;}
.backbtn{display:none; background:none; border:none; color:var(--soft); padding:6px 4px; cursor:pointer; align-items:center;}
.backbtn.show{display:flex;}
html[dir="rtl"] .backbtn svg{transform:scaleX(-1);}
.brand{cursor:pointer; display:flex; align-items:baseline; gap:9px; padding-inline-start:6px;}
.brand .an{font-family:'Amiri',serif; font-size:1.4rem; color:var(--ink); line-height:1;}
.brand .en{font-size:.64rem; letter-spacing:.22em; color:var(--faint); text-transform:uppercase;}
@media(max-width:460px){.brand .en{display:none;}}
.topbtns{display:flex; gap:6px; align-items:center;}
/* one consistent control family: rounded pill groups, same height & border */
.seg{display:flex; border:1px solid var(--line2); border-radius:9px; overflow:hidden; height:38px;}
.seg button{background:none; border:none; padding:0 12px; font-size:.72rem; color:var(--soft); cursor:pointer; font-family:inherit; line-height:1; display:flex; align-items:center; justify-content:center; min-width:42px;}
.seg button+button{border-inline-start:1px solid var(--line);}
.seg button.on{background:var(--acc2); color:#fff;}
.seg button:active{background:var(--panel2);}
.seg button.on:active{background:var(--acc);}
.seg .aletter{font-family:'Amiri',serif; font-size:.9rem;}
.hbtn{display:flex; align-items:center; justify-content:center; width:40px; height:38px; background:none; border:1px solid var(--line2); border-radius:9px; color:var(--soft); cursor:pointer; padding:0;}
.hbtn:active{background:var(--panel2); color:var(--ink);}
.hbtn svg.i{width:17px; height:17px;}

/* ---- floating tab bar — detached translucent capsule ---- */
nav.bottom{position:fixed; left:50%; transform:translateX(-50%);
  bottom:calc(9px + env(safe-area-inset-bottom)); z-index:50;
  display:flex; align-items:stretch; gap:1px; max-width:calc(100% - 24px);
  background:var(--panel);
  background:color-mix(in srgb, var(--panel) 78%, transparent);
  -webkit-backdrop-filter:saturate(180%) blur(22px); backdrop-filter:saturate(180%) blur(22px);
  border:1px solid color-mix(in srgb, var(--line2) 70%, transparent);
  border-radius:22px; padding:5px;
  box-shadow:0 10px 30px rgba(31,30,29,.16), 0 2px 8px rgba(31,30,29,.07);}
[data-theme="dark"] nav.bottom{box-shadow:0 10px 30px rgba(0,0,0,.45);}
nav.bottom button{background:none; border:none; color:var(--faint); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  font-family:inherit; font-size:.56rem; letter-spacing:0; line-height:1;
  padding:7px 11px; border-radius:15px; transition:color .15s, background .2s ease, transform .1s;}
nav.bottom button:active{transform:scale(.93);}
nav.bottom .ico{display:flex; align-items:center; justify-content:center;}
nav.bottom svg.i{width:22px; height:22px;}
nav.bottom button.on{color:var(--acc); background:var(--accbg);}
nav.bottom button.on svg.i{stroke-width:2.1;}
html[lang="ar"] nav.bottom button{font-size:.64rem;}
@media(max-width:360px){ nav.bottom button{padding:7px 8px;} nav.bottom svg.i{width:21px;height:21px;} }

.view{display:none;}
.view.on{display:block; animation:vin .18s ease;}
@keyframes vin{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

/* ---- hero ---- */
.hero{margin:28px 0 4px; padding:4px 8px 20px; text-align:center; border-bottom:1px solid var(--line);}
.hero .bism{font-size:1.05rem; color:var(--faint); margin-bottom:8px;}
.hero h1{font-family:'Amiri',serif; font-size:3rem; margin:0; line-height:1.25; color:var(--ink); font-weight:400;}
.hero .sub{color:var(--soft); font-size:.88rem; margin:8px auto 0; max-width:480px;}
.orn{display:flex; justify-content:center; margin:12px 0 0; color:var(--acc2);}
.orn svg{width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:1.5; stroke-linecap:round;}
.hijri{text-align:center; color:var(--faint); font-size:.8rem; margin:12px 0 20px; letter-spacing:.03em;}

/* ---- index cards (home) — floating rounded tiles ---- */
.index{display:flex; flex-direction:column; gap:11px; margin-top:8px;}
.irow{display:flex; align-items:center; gap:15px; padding:15px 16px; cursor:pointer;
  background:var(--panel); border:1px solid var(--line); border-radius:15px;
  box-shadow:0 1px 2px rgba(31,30,29,.05); transition:transform .12s ease, background .12s;}
.irow:active{transform:scale(.98); background:var(--panel2);}
.irow svg.ic{width:40px; height:40px; padding:10px; box-sizing:border-box; border-radius:11px;
  background:var(--accbg); color:var(--acc); stroke:var(--acc); flex:0 0 auto;}
.irow .tt{font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:1.08rem;}
html[lang="ar"] .irow .tt{font-family:'Amiri',serif; font-size:1.2rem;}
.irow .chev{margin-inline-start:auto; color:var(--faint);}
html[dir="rtl"] .irow .chev{transform:scaleX(-1);}
.epigraph{margin:30px 0 10px; text-align:center;}
.epigraph .ar{font-size:1.6rem; text-align:center; line-height:2;}
.epigraph .who{color:var(--soft); font-size:.82rem; margin-top:8px; font-style:italic;}
.epigraph .esrc{display:block; color:var(--faint); font-size:.72rem; margin-top:4px; font-style:normal; letter-spacing:.05em;}

/* ---- Today (dashboard) ---- */
.thead{text-align:center; margin:24px 0 14px;}
.thead .tbism{font-size:1.05rem; color:var(--faint); text-align:center;}
.tcard{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:17px 18px; margin:12px 0; cursor:pointer; box-shadow:0 1px 2px rgba(31,30,29,.05); transition:transform .12s ease, background .12s;}
.tcard:active{transform:scale(.985); background:var(--panel2);}
.tcard.hero{border-color:var(--acc2);}
.tc-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.tc-title{font-family:Georgia,'Times New Roman',serif; font-size:1.16rem;}
html[lang="ar"] .tc-title{font-family:'Amiri',serif; font-size:1.32rem;}
.tc-row .chev{color:var(--faint); flex:0 0 auto;}
html[dir="rtl"] .tc-row .chev{transform:scaleX(-1);}
.tc-sub{color:var(--soft); font-size:.85rem; margin-top:3px;}
.tcard.hero.done .tc-sub{color:var(--acc);}
.daykept{text-align:center; font-size:.82rem; color:var(--soft); margin:0 0 13px; letter-spacing:.02em;}
.daykept.kept{color:var(--acc); font-weight:600;}
.pbar{height:6px; background:var(--panel2); border-radius:3px; margin-top:13px; overflow:hidden;}
.pfill{height:100%; background:var(--acc2); border-radius:3px; transition:width .35s ease;}
.tcard.soft{background:none; border-style:dashed; box-shadow:none;}
.statgrid{display:grid; grid-template-columns:1fr 1fr; gap:11px; margin:12px 0;}
.stat{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 14px; text-align:center;}
.stat .sv{font-family:Georgia,serif; font-size:1.95rem; color:var(--acc); line-height:1;}
.stat .sv .of{font-size:1rem; color:var(--faint);}
.stat .sl{font-size:.72rem; color:var(--soft); margin-top:6px; letter-spacing:.02em;}

/* ---- About settings ---- */
.settings{margin:2px 0 6px;}
.setrow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 0; border-bottom:1px solid var(--line);}
.setl{font-size:.92rem;}

h2.vh{font-family:Georgia,'Times New Roman',serif; font-weight:400; font-size:1.45rem; margin:26px 0 12px;}
.vsub{color:var(--soft); font-size:.86rem; margin:0 0 14px;}
.rule{border:none; border-top:1px solid var(--line); margin:10px 0 16px;}

/* ---- grade chips (quiet) ---- */
.gchip{flex:0 0 auto; width:20px; height:20px; border-radius:50%; border:1px solid currentColor; display:inline-flex; align-items:center; justify-content:center; font-size:.6rem; font-weight:700; opacity:.75;}
.gchip.A{color:var(--gA);} .gchip.B{color:var(--gB);} .gchip.C{color:var(--gC);} .gchip.D{color:var(--gD);}
html[lang="ar"] .gchip{font-family:'Amiri',serif; font-size:.78rem; font-weight:400;}
.npres{flex:0 0 auto; font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; color:var(--gD); border:1px solid var(--gD); border-radius:3px; padding:0 5px; opacity:.8;}

/* ---- library ---- */
.filterrow{display:flex; flex-wrap:wrap; gap:2px 14px; margin:0 0 4px; align-items:center;}
.flink{background:none; border:none; font-family:inherit; color:var(--soft); font-size:.8rem; letter-spacing:.04em; padding:6px 2px; cursor:pointer; border-bottom:2px solid transparent;}
.flink.on{color:var(--acc); border-bottom-color:var(--acc2);}
details.entry{border-bottom:1px solid var(--line);}
details.entry summary{list-style:none; cursor:pointer; padding:15px 2px; display:flex; align-items:center; gap:10px;}
details.entry summary::-webkit-details-marker{display:none;}
details.entry summary .nm{font-family:Georgia,'Times New Roman',serif; font-size:1rem; flex:1;}
html[lang="ar"] details.entry summary .nm{font-family:'Amiri',serif;}
details.entry .body{padding:2px 2px 20px;}
.entry .ar{font-size:calc(1.6rem * var(--uz,1)); line-height:2.3; margin:8px 0 6px; color:var(--ink);}
.entry .tl{color:var(--soft); font-size:.84rem; font-style:italic;}
.entry .en{color:var(--soft); font-size:.9rem; margin-top:9px;}
.how{margin:12px 0 0; font-size:.86rem; color:var(--soft); border-inline-start:2px solid var(--acc2); padding-inline-start:12px;}
details.meta{margin-top:12px;}
details.meta summary{list-style:none; cursor:pointer; color:var(--faint); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; padding:4px 0;}
details.meta summary::-webkit-details-marker{display:none;}
details.meta summary::before{content:"+"; margin-inline-end:7px;}
details.meta[open] summary::before{content:"−";}
.kv{margin:6px 0 0; font-size:.84rem; color:var(--soft); border-inline-start:2px solid var(--line2); padding-inline-start:12px;}
.kv b{color:var(--ink); font-weight:600;}
.kv .row{margin:5px 0;}
.warnline{margin-top:10px; font-size:.84rem; color:var(--gD); border-inline-start:2px solid var(--gD); padding-inline-start:12px;}
.linklike{background:none; border:none; font-family:inherit; color:var(--acc); text-decoration:underline; cursor:pointer; font-size:.84rem; padding:0;}

/* ---- programs ---- */
#tierlist{border-top:none !important; display:flex; flex-direction:column; gap:11px; margin-top:8px;}
.prow{display:flex; align-items:center; gap:14px; padding:16px 16px; cursor:pointer;
  background:var(--panel); border:1px solid var(--line); border-radius:15px;
  box-shadow:0 1px 2px rgba(31,30,29,.05); transition:transform .12s ease, background .12s;}
.prow:active{transform:scale(.98); background:var(--panel2);}
.prow .tt{font-family:Georgia,'Times New Roman',serif; font-size:1.08rem; flex:1;}
html[lang="ar"] .prow .tt{font-family:'Amiri',serif;}
.prow .chev{color:var(--faint);}
html[dir="rtl"] .prow .chev{transform:scaleX(-1);}
.srcline{font-size:.76rem; color:var(--faint); margin:2px 0 10px; letter-spacing:.02em;}
.honesty{border-inline-start:2px solid var(--acc2); padding:2px 0 2px; padding-inline-start:12px; margin:14px 0; color:var(--soft); font-size:.86rem;}
.honesty b{color:var(--ink);}
.st{display:flex; gap:13px; padding:15px 2px; border-bottom:1px solid var(--line); cursor:pointer; align-items:flex-start;}
.st .box{flex:0 0 20px; width:20px; height:20px; border:1.5px solid var(--faint); border-radius:6px; margin-top:6px; display:flex; align-items:center; justify-content:center; color:transparent; font-size:13px;}
.st.done .box{background:var(--acc2); border-color:var(--acc2); color:#fff;}
.st .s-ar{font-size:calc(1.45rem * var(--uz,1)); line-height:2.15;}
.st .s-en{color:var(--soft); font-size:.8rem; margin-top:3px;}
.fulldua{margin-top:7px;}
.fulldua summary{cursor:pointer; color:var(--acc); font-size:.78rem; list-style:none; display:inline-block; padding:2px 0;}
.fulldua summary::-webkit-details-marker{display:none;}
.fulldua summary::before{content:"⌄ ";}
.fulldua[open] summary::before{content:"⌃ ";}
.fulldua .s-ar{font-size:calc(1.3rem * var(--uz,1)); line-height:2.05; margin-top:6px; color:var(--ink);}
.xcount{margin-inline-start:auto; flex:0 0 auto; align-self:center; color:var(--soft); font-family:Georgia,serif; font-size:1.05rem; letter-spacing:.02em;}
.st.done .xcount{color:var(--acc);}
.st .cnt{margin-inline-start:auto; flex:0 0 auto; text-align:center; min-width:52px; padding-top:4px;}
.st .cnt .n{font-size:1.1rem; font-weight:700; color:var(--acc);}
.st .cnt .t{font-size:.64rem; color:var(--faint); letter-spacing:.05em;}
.st.done .cnt .n{color:var(--acc2);}
.bigbtn{display:block; width:100%; background:var(--ink); color:var(--bg); border:none; border-radius:var(--rad); padding:14px; font-size:.92rem; letter-spacing:.03em; cursor:pointer; font-family:inherit; margin:16px 0 8px;}
[data-theme="dark"] .bigbtn{background:var(--acc2); color:#fff;}
.bigbtn.ghost{background:none; color:var(--soft); border:1px solid var(--line);}
.smallbtn{background:none; border:1px solid var(--line); color:var(--soft); border-radius:8px; padding:8px 15px; font-size:.78rem; cursor:pointer; font-family:inherit;}
.linkbtn{display:inline-block; background:none; border:none; color:var(--faint); font-size:.76rem; cursor:pointer; font-family:inherit; padding:9px 4px; margin-top:4px; text-decoration:underline; text-underline-offset:2px;}
.linkbtn.warn{color:var(--acc); font-weight:600; text-decoration:none;}
.smallbtn:active{background:var(--panel2);}
.fbb{min-width:92px; color:var(--acc); border-color:var(--acc2);}
.ctl-row{display:flex; justify-content:center; gap:10px; margin-top:14px; flex-wrap:wrap;}
.pnote{color:var(--faint); font-size:.8rem; text-align:center; margin:12px 0;}

/* ---- counter ---- */
.cselect{display:flex; align-items:center; justify-content:center; gap:8px; margin:20px auto 2px; padding:11px 20px; background:var(--panel); border:1px solid var(--line2); border-radius:999px; color:var(--ink); font-family:Georgia,'Times New Roman',serif; font-size:1.05rem; cursor:pointer; box-shadow:0 1px 2px rgba(31,30,29,.05);}
.cselect:active{background:var(--panel2);}
.cselect .csname{color:var(--acc);}
.cselect .csv{width:18px; height:18px; color:var(--faint);}
html[lang="ar"] .cselect{font-family:'Amiri',serif; font-size:1.2rem;}
.ctext{text-align:center; margin:6px auto 0; max-width:560px;}
.ctext .ar{font-size:calc(1.5rem * var(--uz,1)); line-height:2.2; text-align:center;}
.ctext .srcline{text-align:center; margin:2px 0 0;}
.ring{width:216px; height:216px; margin:18px auto 8px; position:relative;}
.ring svg{transform:rotate(-90deg);}
.ring .base{stroke:var(--line); fill:none; stroke-width:8;}
.ring .prog{stroke:var(--acc2); fill:none; stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset .15s;}
.ring .mid{position:absolute; inset:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; border-radius:50%;}
.ring.done .mid{background:var(--accbg);}
.ring .cnt{font-size:3rem; color:var(--ink); line-height:1; font-family:Georgia,serif;}
.ring.done .cnt{color:var(--acc);}
.ring .tgt{color:var(--faint); font-size:.74rem; margin-top:6px; letter-spacing:.06em; text-transform:uppercase;}
.presets{display:flex; justify-content:center; gap:18px; margin:10px 0 0;}
.preset{background:none; border:none; font-family:inherit; font-size:1rem; color:var(--soft); cursor:pointer; padding:6px 4px; border-bottom:2px solid transparent;}
.preset.on{color:var(--acc); border-bottom-color:var(--acc2);}
.custrow{display:flex; gap:8px; margin:12px auto; max-width:340px;}
.custrow input{flex:1; background:var(--panel); border:1px solid var(--line); color:var(--ink); border-radius:6px; padding:10px 12px; font-size:.95rem; font-family:inherit;}

/* ---- trackers ---- */
.trk{border:1px solid var(--line); border-radius:var(--rad); padding:16px 18px; margin:14px 0; background:var(--panel);}
.trk h3{margin:0 0 3px; font-size:1rem; font-family:Georgia,'Times New Roman',serif; font-weight:400;}
html[lang="ar"] .trk h3{font-family:'Amiri',serif;}
.trk .sub2{color:var(--soft); font-size:.82rem; margin-bottom:10px;}
.gridN{display:grid; grid-template-columns:repeat(10,1fr); gap:4px; margin:10px 0;}
.gridN div{aspect-ratio:1; border-radius:3px; background:var(--panel2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:.58rem; color:var(--faint);}
.gridN div.on{background:var(--acc2); color:#fff; border-color:var(--acc2);}
/* ---- report (constancy calendar) ---- */
.calmo{padding-bottom:14px;}
.calmo-h{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px;}
.calmo-n{color:var(--faint); font-size:.72rem;}
.calhead{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:5px;}
.calhead div{text-align:center; font-size:.56rem; letter-spacing:.03em; color:var(--faint); text-transform:uppercase;}
.calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
.calgrid div{aspect-ratio:1; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:.64rem; color:var(--soft); background:var(--panel2); border:1px solid var(--line);}
.calgrid .blank{background:none; border:none;}
.calgrid .kept{background:var(--acc2); color:#fff; border-color:var(--acc2); font-weight:700;}
.calgrid .today{outline:2px solid var(--acc); outline-offset:1px;}

/* ---- learn ---- */
details.sec{border-bottom:1px solid var(--line);}
details.sec summary{list-style:none; cursor:pointer; padding:16px 2px; font-family:Georgia,'Times New Roman',serif; font-size:1rem; display:flex; align-items:baseline;}
html[lang="ar"] details.sec summary{font-family:'Amiri',serif;}
details.sec summary::-webkit-details-marker{display:none;}
details.sec summary::after{content:"+"; margin-inline-start:auto; color:var(--faint); font-weight:400;}
details.sec[open] summary::after{content:"−";}
details.sec .inner{padding:0 2px 18px; color:var(--soft); font-size:.9rem;}
details.sec .inner p{margin:8px 0;}
details.sec .inner b{color:var(--ink);}
details.sec .inner .ar{color:var(--ink); font-size:1.4rem; line-height:2.15; margin:8px 0;}
.tagline{color:var(--acc); font-size:.66rem; letter-spacing:.22em; text-transform:uppercase; margin:26px 0 2px;}
.footer{color:var(--faint); font-size:.76rem; text-align:center; margin:28px 0 12px; line-height:1.7;}

/* ---- read CTA / button ---- */
.readcta{display:inline-flex; align-items:center; gap:6px; margin-top:12px; background:var(--accbg); color:var(--acc); border:1px solid var(--acc2); border-radius:999px; padding:8px 16px; font-family:inherit; font-size:.82rem; cursor:pointer;}
html[lang="ar"] .readcta{font-family:'Amiri',serif; font-size:.95rem;}
.readcta:active{background:var(--acc2); color:#fff;}
.readbtn{margin-inline-start:auto; flex:0 0 auto; align-self:center; background:var(--accbg); color:var(--acc); border:1px solid var(--acc2); border-radius:999px; padding:6px 14px; font-family:inherit; font-size:.76rem; cursor:pointer;}
html[lang="ar"] .readbtn{font-family:'Amiri',serif; font-size:.9rem;}

/* ---- Ḥizb al-Baḥr reading ---- */
.bahrintro{color:var(--soft); font-size:.9rem;}
.bahrintro p{margin:8px 0;} .bahrintro b{color:var(--ink);}
.reading{margin:6px 0 8px;}
.rpara{padding:14px 0; border-bottom:1px solid var(--line);}
.rpara .ar{font-size:calc(1.55rem * var(--uz,1)); line-height:2.35; color:var(--ink);}
.rpara .trans{color:var(--faint); font-size:.82rem; font-style:italic; margin-top:6px; direction:ltr; text-align:left;}
html[dir="rtl"] .rpara .trans{text-align:right;}
.mushaf{direction:rtl; margin:12px 0 10px;}
.mushaf .basmala{font-family:'Amiri','Scheherazade New',serif; text-align:center; font-size:calc(1.32rem * var(--uz,1)); color:var(--ink); margin:2px 0 22px;}
.mushaf .flow{font-family:'Amiri','Scheherazade New','Noto Naskh Arabic',serif; direction:rtl; text-align:justify; text-align-last:center; font-size:calc(1.5rem * var(--uz,1)); line-height:2.55; color:var(--ink);}
.mushaf .vn{color:var(--acc); font-size:.58em; margin:0 .06em; white-space:nowrap;}
.rinsert{margin:14px 0; padding:14px 16px; border:1px solid var(--acc2); background:var(--accbg); border-radius:12px;}
.rinsert .itag{color:var(--acc); font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; margin-bottom:6px;}
html[lang="ar"] .rinsert .itag{letter-spacing:0; font-family:'Amiri',serif; font-size:.86rem;}
.rinsert .ar{font-size:calc(1.5rem * var(--uz,1)); line-height:2.2; color:var(--ink);}
.rinsert .trans{color:var(--soft); font-size:.82rem; font-style:italic; margin-top:6px; direction:ltr; text-align:left;}
html[dir="rtl"] .rinsert .trans{text-align:right;}
.rinsert .srcline{margin-top:4px;}

/* ---- counter picker sheet ---- */
.csheet{position:fixed; inset:0; z-index:80; background:rgba(25,24,22,.5); display:none; align-items:flex-end; justify-content:center;}
.csheet.on{display:flex;}
.csbox{background:var(--bg); border-top:2px solid var(--acc2); border-radius:16px 16px 0 0; max-width:720px; width:100%; max-height:80vh; overflow:auto; padding:16px 16px calc(16px + env(safe-area-inset-bottom));}
.csheet-h{text-align:center; color:var(--soft); font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; margin:4px 0 12px;}
html[lang="ar"] .csheet-h{letter-spacing:0; font-family:'Amiri',serif; font-size:.95rem;}
.csgroup{border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-bottom:12px; background:var(--panel);}
.csgrp-h{font-size:.7rem; color:var(--faint); letter-spacing:.05em; text-transform:uppercase; margin:2px 4px 6px;}
html[lang="ar"] .csgrp-h{letter-spacing:0; text-transform:none; font-size:.78rem;}
.csrow{display:flex; align-items:center; gap:8px; width:100%; text-align:start; background:none; border:none; border-bottom:1px solid var(--line); padding:14px 15px; font-family:Georgia,'Times New Roman',serif; font-size:1rem; color:var(--ink); cursor:pointer;}
html[lang="ar"] .csrow{font-family:'Amiri',serif; font-size:1.15rem;}
.csrow:last-child{border-bottom:none;}
.csrow:active{background:var(--panel2);}
.csrow.on{color:var(--acc); background:var(--accbg);}
.csrow-l{flex:1;}
.csck{width:18px; height:18px; color:var(--acc); flex:0 0 auto;}
.csdel{flex:0 0 auto; background:none; border:none; color:var(--faint); cursor:pointer; font-size:1.1rem; padding:0 4px;}
.csadd{display:flex; align-items:center; justify-content:center; gap:7px; width:100%; background:none; border:1px dashed var(--line2); border-radius:12px; padding:13px; color:var(--acc); font-family:inherit; font-size:.9rem; cursor:pointer;}
html[lang="ar"] .csadd{font-family:'Amiri',serif; font-size:1.05rem;}
.csform{border:1px solid var(--line2); border-radius:12px; padding:12px; margin-bottom:12px; background:var(--panel);}
.csform textarea{width:100%; box-sizing:border-box; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px; font-family:'Amiri',serif; font-size:1.3rem; color:var(--ink); min-height:70px; direction:rtl; text-align:right;}
.csform input{width:100%; box-sizing:border-box; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-family:inherit; font-size:.9rem; color:var(--ink); margin-top:8px;}
.csform .row2{display:flex; gap:8px; margin-top:10px;}
.csform .row2 button{flex:1;}

/* ---- welcome (first run) ---- */
.welcome{position:fixed; inset:0; z-index:100; background:var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px 26px calc(40px + env(safe-area-inset-bottom));}
.welcome.show{display:flex;}
.welcome .worn{color:var(--acc2); margin-bottom:18px;}
.welcome .worn svg{width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.4; stroke-linecap:round;}
.welcome .wbrand{font-family:'Amiri',serif; font-size:3.6rem; color:var(--ink); line-height:1.15; text-align:center;}
.welcome .wname{font-size:.72rem; letter-spacing:.3em; text-transform:uppercase; color:var(--faint); margin-top:8px;}
html[lang="ar"] .welcome .wname{display:none;}
.welcome .wphrase{font-family:'Amiri',serif; font-size:1.7rem; color:var(--acc); margin:34px auto 0; direction:rtl; line-height:1.95; max-width:340px; text-align:center;}
.welcome .wbtn{width:130px; height:130px; padding:0; border-radius:50%; background:var(--panel); border:1px solid var(--line2); color:var(--ink); font-family:inherit; font-size:1.05rem; letter-spacing:.06em; display:flex; align-items:center; justify-content:center; margin:36px auto 0; cursor:pointer;}
.welcome .wbtn:active{transform:scale(.97); border-color:var(--acc2);}

.toast{position:fixed; bottom:86px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--ink); color:var(--bg); border-radius:8px; padding:10px 18px; font-size:.84rem; opacity:0; pointer-events:none; transition:all .3s; z-index:90; max-width:86vw; text-align:center;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

/* ============ Arabic interface ============ */
html[lang="ar"] body{font-family:'Amiri',Georgia,serif;}
html[lang="ar"] .hero .sub, html[lang="ar"] .vsub, html[lang="ar"] .footer,
html[lang="ar"] .epigraph .who{line-height:1.9;}
html[lang="ar"] h2.vh{font-family:'Amiri',serif;}
html[lang="ar"] nav.bottom button{font-size:.78rem; letter-spacing:0; text-transform:none; font-family:'Amiri',serif;}
html[lang="ar"] .tbtn{font-size:.9rem;}
html[lang="ar"] .flink, html[lang="ar"] .smallbtn, html[lang="ar"] .bigbtn,
html[lang="ar"] .preset, html[lang="ar"] .custrow input{font-family:'Amiri',Georgia,serif;}
html[lang="ar"] .entry .tl{display:none;}
html[dir="rtl"] .toast{direction:rtl;}
html[dir="rtl"] .st, html[dir="rtl"] .prow{text-align:right;}
html[dir="rtl"] .kv .row, html[dir="rtl"] .honesty, html[dir="rtl"] .warnline,
html[dir="rtl"] .entry .en, html[dir="rtl"] .pnote, html[dir="rtl"] .sub2, html[dir="rtl"] .how{text-align:right;}
html[dir="rtl"] .num, html[dir="rtl"] .ltr{direction:ltr; unicode-bidi:isolate; display:inline-block;}

/* ================= BAṢĪRA — graded canon ================= */

   (Fatḥ al-Malik al-Majīd, 1322 AH print) and Khazīnat al-Asrār (al-Nāzillī) — page images read directly. */
const PRACTICES = [

/* ---------------- GRADE A ---------------- */
{id:"afiya", grade:"A", presc:true, nm:"The ʿĀfiya duʿāʾ — well-being in my sight",
 ar:"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ",
 tl:"Allāhumma ʿāfinī fī badanī, Allāhumma ʿāfinī fī samʿī, Allāhumma ʿāfinī fī baṣarī, lā ilāha illā ant.",
 en:"O Allah, grant me well-being in my body; O Allah, grant me well-being in my hearing; O Allah, grant me well-being in my sight. There is no god but You.",
 how:"Three times in the morning and three times in the evening — the transmitted count.",
 src:"Abū Dāwūd 5090 · Aḥmad 20430 · al-Adab al-Mufrad 701",
 grading:"Isnād ḥasan (al-Albānī; Ibn Ḥajar; Ibn Bāz), with a known discussion around one narrator — the preponderant view is ḥasan.",
 note:"The only eyesight text in the Sunnah with a fixed daily count: the spine of the Daily Wird."},

{id:"light", grade:"A", presc:true, nm:"The Light duʿāʾ — «and in my sight, light»",
 ar:"اللَّهُمَّ اجْعَلْ فِي قَلْبِي نُورًا، وَفِي بَصَرِي نُورًا، وَفِي سَمْعِي نُورًا، وَعَنْ يَمِينِي نُورًا، وَعَنْ يَسَارِي نُورًا، وَفَوْقِي نُورًا، وَتَحْتِي نُورًا، وَأَمَامِي نُورًا، وَخَلْفِي نُورًا، وَاجْعَلْ لِي نُورًا",
 tl:"Allāhumma jʿal fī qalbī nūrā, wa-fī baṣarī nūrā, wa-fī samʿī nūrā…",
 en:"O Allah, place in my heart light, and in my sight light, and in my hearing light; on my right and left light; above and below me light; before and behind me light — and make for me light.",
 how:"Said in the night prayer, and in one wording on the way out to Fajr. No count specified.",
 src:"al-Bukhārī 6316 · Muslim 763",
 grading:"Muttafaq ʿalayh.",
 note:"Ibn Ḥajar counts many 'light' phrases across the variants; the commentators read the light first as guidance shining in the faculties — baṣīra itself."},

{id:"matti", grade:"A", presc:true, nm:"«Let us enjoy our hearing and our sight…»",
 ar:"اللَّهُمَّ مَتِّعْنَا بِأَسْمَاعِنَا وَأَبْصَارِنَا وَقُوَّتِنَا مَا أَحْيَيْتَنَا، وَاجْعَلْهُ الْوَارِثَ مِنَّا",
 tl:"Allāhumma mattiʿnā bi-asmāʿinā wa-abṣārinā wa-quwwatinā mā aḥyaytanā, wa-jʿalhu l-wāritha minnā.",
 en:"O Allah, let us enjoy our hearing, our sight and our strength for as long as You keep us alive — and make that endure to our last day.",
 how:"Part of the longer Prophetic duʿāʾ «اللَّهُمَّ اقْسِمْ لَنَا مِنْ خَشْيَتِكَ…». No count specified. A first-person singular version is transmitted from Abū Hurayra.",
 src:"al-Tirmidhī 3502 (ṣaḥīḥ) · singular (Abū Hurayra): al-Adab al-Mufrad 650, al-Ḥākim 1/523, al-Silsila al-Ṣaḥīḥa 3170",
 grading:"Ṣaḥīḥ (the 3502 wording); the singular «mattiʿnī bi-samʿī wa-baṣarī» is ṣaḥīḥ in its own right.", note:""},

{id:"muawwidhat", grade:"A", presc:true, nm:"The nightly palms — the three Quls over the face",
 ar:"قُلْ هُوَ اللهُ أَحَدٌ · قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ · قُلْ أَعُوذُ بِرَبِّ النَّاسِ",
 tl:"al-Ikhlāṣ, al-Falaq and al-Nās — into the cupped palms, then the wipe.",
 en:"Every night at bed the Prophet ﷺ cupped his palms, recited the three Quls into them, blew, and wiped whatever he could reach of his body — beginning with his head and face — three times.",
 how:"Three times each night; the wipe passes over the eyes by its very motion.",
 src:"al-Bukhārī 5017 (ʿĀʾisha)", grading:"Ṣaḥīḥ.", note:""},

{id:"fatiha", grade:"A", presc:true, nm:"al-Fātiḥa — read for the need",
 ar:"سُورَةُ الْفَاتِحَةِ — «وَمَا أَدْرَاكَ أَنَّهَا رُقْيَةٌ»",
 tl:"al-Fātiḥa — 'And how did you know it is a ruqya?'",
 en:"A Companion healed a scorpion-struck chief with nothing but al-Fātiḥa; the Prophet ﷺ approved — «and how did you know it is a ruqya?»",
 how:"Read over yourself or the one in need, with your intention. The Opening of the Book — the umma reads it for its needs; the count is your own.",
 src:"al-Bukhārī 2276, 5736 · Muslim 2201", grading:"Muttafaq ʿalayh.", note:"al-Fātiḥa is umm al-Qurʾān and al-Shāfiya — read here with the intention for the eyes."},

{id:"yasin", grade:"A", presc:true, nm:"Sūrat Yāsīn",
 ar:"يٰسٓ · وَالْقُرْآنِ الْحَكِيمِ",
 tl:"",
 en:"The heart of the Qurʾān — read for what it is read for.",
 how:"",
 src:"Qurʾān, Sūra 36.",
 grading:"The reading is Qurʾān; reciting Yāsīn for a need is a practice long kept by the umma.",
 note:"",
 read:"yasin"},

{id:"blindman", grade:"A", presc:true, nm:"The Blind Man's duʿāʾ",
 ar:"اللَّهُمَّ إِنِّي أَسْأَلُكَ وَأَتَوَجَّهُ إِلَيْكَ بِنَبِيِّكَ مُحَمَّدٍ نَبِيِّ الرَّحْمَةِ، إِنِّي تَوَجَّهْتُ بِكَ إِلَى رَبِّي فِي حَاجَتِي هَذِهِ لِتُقْضَى لِي، اللَّهُمَّ فَشَفِّعْهُ فِيَّ",
 tl:"Allāhumma innī asʾaluka wa-atawajjahu ilayka bi-nabiyyika Muḥammadin nabiyyi r-raḥma…",
 en:"O Allah, I ask You and turn to You by Your Prophet Muḥammad, the Prophet of Mercy. I have turned by him to my Lord in this need of mine, that it be fulfilled. O Allah, accept his intercession for me.",
 how:"The transmitted protocol: the Prophet ﷺ first offered patience as the better choice; then excellent wuḍūʾ; the Ibn Mājah wording adds two rakʿahs; then the duʿāʾ, once.",
 src:"al-Tirmidhī 3578 (ṣaḥīḥ) · Ibn Mājah 1385 · Aḥmad 17279",
 grading:"Ṣaḥīḥ — al-Tirmidhī, Ibn Khuzayma, Ibn Ḥibbān, al-Ḥākim, al-Nawawī, Ibn Ḥajar, al-Albānī.",
 note:"The text is agreed authentic; scholars dispute only its generalization (tawassul by person vs. by duʿāʾ). Your school and teacher guide the rest."},

{id:"adhhib", grade:"A", presc:true, nm:"«Remove the harm…» — the Prophet's healing duʿāʾ",
 ar:"اللَّهُمَّ رَبَّ النَّاسِ، أَذْهِبِ الْبَاسَ، اشْفِ وَأَنْتَ الشَّافِي، لَا شِفَاءَ إِلَّا شِفَاؤُكَ، شِفَاءً لَا يُغَادِرُ سَقَمًا",
 tl:"Allāhumma Rabba n-nās, adhhibi l-bāsa, ishfi wa-anta sh-Shāfī, lā shifāʾa illā shifāʾuk, shifāʾan lā yughādiru saqamā.",
 en:"O Allah, Lord of humankind, remove the harm; heal — for You are the Healer; there is no healing but Your healing: a healing that leaves no sickness behind.",
 how:"Said while wiping the sick with the right hand. No count specified.",
 src:"al-Bukhārī 5743 · Muslim 2191", grading:"Muttafaq ʿalayh.", note:""},

{id:"seven", grade:"A", presc:true, nm:"The sevenfold plea — said over the sick",
 ar:"أَسْأَلُ اللهَ الْعَظِيمَ رَبَّ الْعَرْشِ الْعَظِيمِ أَنْ يَشْفِيَكَ",
 tl:"Asʾalu Llāha l-ʿAẓīm, Rabba l-ʿarshi l-ʿaẓīm, an yashfiyak — seven times.",
 en:"I ask Allah the Magnificent, Lord of the Magnificent Throne, to heal you.",
 how:"Seven times, by a visitor over a sick person whose time has not come. Keep the transmitted setting: have someone who loves you say it over you.",
 src:"al-Tirmidhī 2083", grading:"Ṣaḥīḥ.", note:""},

{id:"ayn_ghusl", grade:"A", presc:true, nm:"The evil-eye washing — the Sunnah protocol",
 ar:"يُؤْمَرُ الْعَائِنُ أَنْ يَتَوَضَّأَ — يَغْسِلُ وَجْهَهُ وَيَدَيْهِ وَمِرْفَقَيْهِ وَرُكْبَتَيْهِ وَأَطْرَافَ رِجْلَيْهِ وَدَاخِلَةَ إِزَارِهِ — ثُمَّ يُصَبُّ عَلَى رَأْسِ الْمَعِينِ",
 tl:"The one whose eye struck washes — face, hands, elbows, knees, feet, the inner wrap — and the water is poured over the one struck.",
 en:"When the eye is known to have struck, the Prophet ﷺ commanded the admirer to wash, and the water to be poured over the afflicted — and he taught the admirer to bless instead: «اللَّهُمَّ بَارِكْ فِيهِ وَلَا تَضُرَّهُ».",
 how:"As transmitted; al-Dayrabī records the full protocol among 'the tried remedies which he ﷺ commanded' (Bāb 21).",
 src:"Base: Muslim 2188 (Ibn ʿAbbās) and the incident of Sahl b. Ḥunayf (Aḥmad, Mālik) · al-Dayrabī, Fatḥ al-Malik al-Majīd p. 103",
 grading:"Ṣaḥīḥ (the base ḥadīth).",
 note:"The Sunnah's own answer to the harmed eye — and its prevention: the admirer's blessing."},

{id:"khaybar", grade:"A", presc:false, nm:"The Prophet's ﷺ healing of the eyes — the ground of nafth",
 ar:"فَبَصَقَ رَسُولُ اللَّهِ ﷺ فِي عَيْنَيْهِ وَدَعَا لَهُ، فَبَرَأَ حَتَّى كَأَنْ لَمْ يَكُنْ بِهِ وَجَعٌ",
 tl:"Fa-baṣaqa Rasūlu Llāhi ﷺ fī ʿaynayhi wa-daʿā lahu, fa-baraʾa ḥattā ka-an lam yakun bihi wajaʿ.",
 en:"At Khaybar ʿAlī's eyes were sore and he could not see; the Prophet ﷺ put his blessed saliva to them and prayed for him, and he was healed at once as though he had never had any ailment.",
 how:"Not a daily routine — a Prophetic precedent. It grounds the nafth (light blowing) toward the eyes that runs through the counted practices here.",
 src:"al-Bukhārī 4210 (also 2942, 3701) · Muslim 2406",
 grading:"Ṣaḥīḥ — the one eye-specific Prophetic healing that is soundly transmitted.",
 note:"A separate report of a blind man's sight returning at the Prophet's ﷺ blowing (Ḥabīb b. Mudrik) is weak — a sign of prophethood, not a transmissible ʿamal."},

/* ---------------- GRADE B ---------------- */
{id:"ithmid", grade:"B", presc:true, nm:"Ithmid kohl — the eyesight Sunnah",
 ar:"عَلَيْكُمْ بِالْإِثْمِدِ فَإِنَّهُ يَجْلُو الْبَصَرَ وَيُنْبِتُ الشَّعَرَ",
 tl:"ʿAlaykum bi-l-ithmid, fa-innahu yajlu l-baṣara wa-yunbitu sh-shaʿar.",
 en:"Keep to ithmid, for it clears the sight and grows the lashes.",
 how:"At sleep, an odd number: three in each eye, or three in the right and two in the left — both authentically transmitted.",
 src:"Matn: al-Tirmidhī 1757 · Ibn Mājah 3497 · Abū Dāwūd 3878 (ṣaḥīḥ, al-Albānī: Ṣaḥīḥ al-Jāmiʿ 1197) · the 3-right/2-left variant: Anas, in al-Silsila al-Ṣaḥīḥa 633",
 grading:"Ṣaḥīḥ — through its combined routes.",
 note:"Ibn al-Qayyim, Zād al-Maʿād: 'In kohl is preservation of the eye's health and strengthening of the seeing light… and ithmid has a special property in that.'"},

/* ---------------- GRADE C — the mujarrabāt, cited to the page ---------------- */
{id:"yabasir", grade:"C", presc:true, nm:"«Yā Baṣīr» — the All-Seeing, after prayer",
 ar:"يَا بَصِيرُ — ثُمَّ الْمَسْحُ عَلَى الْعَيْنَيْنِ مَعَ: اللَّهُمَّ قَوِّ بَصَرِي بِحُرْمَةِ اسْمِكَ الْبَصِيرِ",
 tl:"Yā Baṣīr — then, wiping the eyes: Allāhumma qawwi baṣarī bi-ḥurmati smika l-Baṣīr.",
 en:"O All-Seeing — called on after prayer, then wiping over the eyes: O Allah, strengthen my sight by the sanctity of Your Name, the All-Seeing.",
 how:"Kept up after prayer, joined with wiping the eyes and the duʿāʾ. The Name is the anchor; the count is your own.",
 src:"The Divine Name al-Baṣīr (al-Shūrā 42:11). The «hundred after Jumuʿa» form circulates in a khawāṣṣ compilation whose classical provenance is not established — so no fixed count is set here.",
 grading:"C — a Divine Name; the counted khawāṣṣ form is of contested provenance.",
 note:"Its authentic anchor is the enjoyment-duʿāʾ «mattiʿnī bi-samʿī wa-baṣarī» — ṣaḥīḥ in its own right (see «Let us enjoy our hearing and our sight»)."},

{id:"fajr15", grade:"C", presc:true, nm:"The Fajr sight-wird ×15 — «Our Lord, perfect for us our light»",
 ar:"رَبَّنَا أَتْمِمْ لَنَا نُورَنَا وَاغْفِرْ لَنَا إِنَّكَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، يَا نُورُ يَا بَصِيرُ (خَمْسَ عَشْرَةَ مَرَّةً) ثُمَّ: يَا رَبِّ (خَمْسًا) قَوِّ بَصَرِي، اللَّهُمَّ اشْفِ أَنْتَ الشَّافِي، اللَّهُمَّ عَافِ أَنْتَ الْمُعَافِي",
 tl:"Rabbanā atmim lanā nūranā wa-ghfir lanā innaka ʿalā kulli shayʾin qadīr, yā Nūru yā Baṣīr — ×15; then yā Rabbi ×5, qawwi baṣarī, Allāhumma shfi anta sh-Shāfī, Allāhumma ʿāfi anta l-Muʿāfī.",
 en:"'Our Lord, perfect for us our light and forgive us; You have power over all things' (66:8) — O Light! O All-Seeing! — fifteen times; then 'O my Lord' five times: strengthen my sight; O Allah heal, You are the Healer; O Allah grant well-being, You are the Well-being-Giver.",
 how:"Daily, between the sunnah and the farḍ of Ṣubḥ, with the hand held on the forehead — as the book gives it.",
 src:"al-Dayrabī, Fatḥ al-Malik al-Majīd, p. 108 ('one of the brethren related to me…')",
 grading:"C — mujarrabāt genre; the book's claim: 'he will never suffer ramad, by Allah's power.'",
 note:"Built on the Qurʾān's own light-verse of the believers (al-Taḥrīm 66:8) and the two Names this app lives under."},

{id:"qaf7", grade:"C", presc:true, nm:"Qāf 50:22 over the thumbs ×7 — 'for the light of sight'",
 ar:"فَكَشَفْنَا عَنكَ غِطَاءَكَ فَبَصَرُكَ الْيَوْمَ حَدِيدٌ (سَبْعَ مَرَّاتٍ عَلَى ظَهْرَيِ الْإِبْهَامَيْنِ، مَعَ الصَّلَاةِ عَلَى النَّبِيِّ ﷺ فِي كُلِّ مَرَّةٍ، ثُمَّ الْمَسْحُ بِهِمَا عَلَى الْعَيْنَيْنِ)",
 tl:"Fa-kashafnā ʿanka ghiṭāʾaka fa-baṣaruka l-yawma ḥadīd — seven times over the backs of the thumbs, with ṣalawāt each time, then wiping the eyes.",
 en:"'So We removed from you your covering, and your sight this day is keen' — recited seven times over the thumbnails, sending blessings on the Prophet ﷺ with each, then wiping the thumbs over the eyes.",
 how:"As transmitted from Shaykh Farīd al-Dīn, the famous walī of India — 'beneficial for the light of sight and the removal of harm from the eyes, in shāʾ Allāh.'",
 src:"Attested in both books: Khazīnat al-Asrār p. 80 and al-Dayrabī p. 108",
 grading:"C — mujarrabāt of a named master, doubly transmitted.",
 note:"In tafsīr the verse describes the resurrected soul's unveiled sight; the khawāṣṣ tradition turns its diction into duʿāʾ. Both framings are given here."},

{id:"nur3", grade:"C", presc:true, nm:"The Light Verse over the eyes — ×3 morning and evening",
 ar:"بِسْمِ اللهِ الرَّحْمَٰنِ الرَّحِيمِ، دَخَلَ الرَّمَدُ بِسَلَامَةٍ وَيَخْرُجُ الرَّمَدُ بِسَلَامَةٍ، وَانْكَفَّتِ الدَّمْعَةُ بِسَلَامَةٍ، وَانْجَلَتِ الْحَرَّةُ بِسَلَامَةٍ، بِأَلْفِ لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ الْعَلِيِّ الْعَظِيمِ — اللَّهُ نُورُ السَّمَاوَاتِ وَالْأَرْضِ… إِلَى قَوْلِهِ: نُورٌ عَلَى نُورٍ",
 tl:"The safety formula, then Āyat al-Nūr (24:35) to 'light upon light' — three times over the eyes, morning and evening.",
 en:"In the Name of Allah… the ramad entered in safety and leaves in safety; the tearing is stilled in safety; the inflammation clears in safety — by a thousand 'no might nor power save by Allah'; then the Light Verse to 'light upon light.'",
 how:"Read over the eyes three times each morning and evening — 'and the ramad departs by Allah's leave.'",
 src:"From Shifāʾ al-Ṣudūr wa-l-Abdān fī sirr manāfiʿ al-Qurʾān, as quoted in al-Dayrabī p. 108",
 grading:"C — a Sunni-transmitted counted Light-Verse practice (a Shiʿi analogue also circulates; this is the Sunni source).", note:""},

{id:"banuri", grade:"C", presc:true, nm:"The per-prayer eyesight ʿamal — Qāf 50:22 · Yā Nūr · «samīʿan baṣīran»",
 ar:"فَكَشَفْنَا عَنكَ غِطَاءَكَ فَبَصَرُكَ الْيَوْمَ حَدِيدٌ (١١) · يَا نُورُ (١١) · فَجَعَلْنَاهُ سَمِيعًا بَصِيرًا (١١) — ثُمَّ يَنْفُثُ فِي أَصَابِعِهِ وَيَمْسَحُ بِهَا عَيْنَيْهِ، بَعْدَ كُلِّ فَرِيضَةٍ",
 tl:"Fa-kashafnā ʿanka ghiṭāʾaka fa-baṣaruka l-yawma ḥadīd ×11 · Yā Nūr ×11 · fa-jaʿalnāhu samīʿan baṣīrā ×11 — then blow on the fingers and wipe the eyes, after every farḍ.",
 en:"After every obligatory prayer: Qāf 50:22 eleven times, Yā Nūr eleven times, and «fa-jaʿalnāhu samīʿan baṣīran» (76:2) eleven times; then blow on the fingers and wipe them over the eyes.",
 how:"After each farḍ prayer — eleven of each, then the wipe. The verses are Qurʾān; the counts and the method are the muftīs' prescription.",
 src:"Jāmiʿa ʿUlūm Islāmiyya al-Bānūrī Town, Karachi — dār al-iftāʾ fatwā no. 144507101438",
 grading:"C — a prescribed ʿamal from a named Deobandi dār al-iftāʾ (mujarrabāt genre, not ḥadīth).",
 note:"The most fully specified, institutionally sourced eyesight routine in this corpus — the natural backbone for a per-prayer regimen."},

{id:"hilal", grade:"C", presc:true, nm:"The new-moon protocol",
 ar:"عِنْدَ رُؤْيَةِ الْهِلَالِ: يَمْسَحُ بِيَمِينِهِ عَلَى عَيْنَيْهِ وَيَقْرَأُ الْفَاتِحَةَ (عَشْرًا، وَفِي خَزِينَةِ الْأَسْرَارِ: خَمْسًا) يُبَسْمِلُ فِي كُلِّ مَرَّةٍ، ثُمَّ قُلْ هُوَ اللهُ أَحَدٌ (ثَلَاثًا)، ثُمَّ: شِفَاءٌ مِنْ كُلِّ دَاءٍ بِرَحْمَتِكَ يَا أَرْحَمَ الرَّاحِمِينَ (سَبْعًا)، ثُمَّ: يَا رَبِّ (خَمْسًا) قَوِّ بَصَرِي، اللَّهُمَّ اشْفِ أَنْتَ الشَّافِي، اللَّهُمَّ اكْفِ أَنْتَ الْكَافِي، اللَّهُمَّ عَافِ أَنْتَ الْمُعَافِي",
 tl:"At first sighting of the crescent: wipe the right hand over the eyes reciting al-Fātiḥa (×10 — Khazīna: ×5), basmala each time; Ikhlāṣ ×3; 'a healing from every disease, by Your mercy, O Most Merciful' ×7; then yā Rabbi ×5 and the healing pleas.",
 en:"A monthly renewal at the crescent — for the one 'seeking cure from weakness of sight or ramad that struck him': look for the hilāl its first night (or second, or third), and when you see it, wipe and recite as given.",
 how:"Monthly, at the sighting of the new crescent. The two books differ on the Fātiḥa count (ten vs. five) — the variant is shown, not silently resolved.",
 src:"al-Dayrabī p. 108 · Khazīnat al-Asrār p. 80 · the books give it as a transmitted report (its isnād is not established — treat as the genre's practice).",
 grading:"C — doubly transmitted in the mujarrabāt literature.", note:""},

{id:"rosewater", grade:"C", presc:true, nm:"Rosewater at sunrise — the gentle mujarrab",
 ar:"وَإِذَا فُتِحَتِ الْعَيْنَانِ فِي مَاءِ وَرْدٍ عِنْدَ طُلُوعِ الشَّمْسِ زَادَ فِي ضَوْءِ الْبَصَرِ زِيَادَةً بَلِيغَةً",
 tl:"Opening the eyes in rosewater at sunrise 'increases the light of sight markedly.'",
 en:"The simplest physical practice in either book: pure rosewater as an eye-bath at sunrise.",
 how:"As the book gives it. Modern sense: use only sterile, additive-free rosewater suitable for eyes; stop at any irritation; not a treatment for any eye disease.",
 src:"al-Dayrabī, p. 109",
 grading:"C — the book's mujarrab tag.", note:""},

{id:"ramad_kitaba", grade:"C", presc:false, nm:"The ramad writing — Yūsuf's shirt and the verse of Qāf",
 ar:"يُكْتَبُ بِزَعْفَرَانٍ وَمَاءِ وَرْدٍ: اذْهَبُوا بِقَمِيصِي هَذَا فَأَلْقُوهُ عَلَى وَجْهِ أَبِي يَأْتِ بَصِيرًا · فَكَشَفْنَا عَنكَ غِطَاءَكَ فَبَصَرُكَ الْيَوْمَ حَدِيدٌ · اللَّهُمَّ أَذْهِبِ الرَّمَدَ…",
 tl:"Written in saffron and rosewater: Yūsuf 12:93, Qāf 50:22, and 'O Allah, take away the ramad…' — the entry continues with the openings of al-Kahf and Maryam.",
 en:"The kitāba (writing) remedy for eye inflammation — built on Yūsuf's shirt (12:93) and the verse of Qāf, as al-Dayrabī records it.",
 how:"Documented as the book gives it (the kitāba genre — writing, then washing/wearing). Not set into the programs; shown so the tradition's actual text is known.",
 src:"al-Dayrabī, pp. 107–108",
 grading:"C — mujarrabāt kitāba practice.", note:"«The writing of Yūsuf's shirt», as al-Dayrabī gives it, with the page."},

{id:"husn_fortress", grade:"C", presc:true, nm:"«I fortify you by the Living, the Self-Subsisting, who does not die»",
 ar:"حَصَّنْتُكُمْ بِالْحَيِّ الْقَيُّومِ الَّذِي لَا يَمُوتُ أَبَدًا، وَدَفَعْتُ عَنْكُمُ السُّوءَ بِأَلْفِ أَلْفِ لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ الْعَلِيِّ الْعَظِيمِ",
 tl:"Ḥaṣṣantukum bi-l-Ḥayyi l-Qayyūmi lladhī lā yamūtu abadā, wa-dafaʿtu ʿankumu s-sūʾa bi-alfi alfi lā ḥawla wa-lā quwwata illā bi-Llāhi l-ʿAliyyi l-ʿAẓīm.",
 en:"I fortify you by the Living, the Self-Subsisting, who never dies; and I repel evil from you by a million 'no might nor power save by Allah, the High, the Magnificent.'",
 how:"Said over those you fear for — al-Dayrabī relates it (from al-Qāḍī Ḥusayn's account of a prophet shielding his people from the eye) in the chapter of the eye and the glance.",
 src:"al-Dayrabī, p. 103",
 grading:"C — with an A-grade cousin: the Names al-Ḥayy al-Qayyūm are transmitted as the Greatest Name (the ḥadīth of Asmāʾ bint ʿUmays).", note:""},

{id:"bahr_haja", grade:"C", presc:true, nm:"Ḥizb al-Baḥr — the reading for a knotted need",
 ar:"يُقْرَأُ حِزْبُ الْبَحْرِ مَرَّةً، وَبَعْدَ «انْصُرْنَا فَإِنَّكَ خَيْرُ النَّاصِرِينَ» — قَبْلَ «وَافْتَحْ لَنَا فَإِنَّكَ خَيْرُ الْفَاتِحِينَ» — تُزَادُ مَرَّةً وَاحِدَةً: رَبَّنَا افْتَحْ بَيْنَنَا وَبَيْنَ قَوْمِنَا بِالْحَقِّ وَأَنْتَ خَيْرُ الْفَاتِحِينَ",
 tl:"The ḥizb once; after 'grant us victory — You are the best of helpers,' before its own plea 'and open for us — You are the best of openers,' insert once: Rabbanā ftaḥ baynanā wa-bayna qawminā bi-l-ḥaqq wa-anta khayru l-fātiḥīn (al-Aʿrāf 7:89).",
 en:"Zarrūq's commentary on al-Shādhilī's sea-litany closes with the stations of intention. For the knotted, stalled matter: one full reading, with Shuʿayb's prayer for opening set once at the litany's own plea for opening — then the reading flows on.",
 how:"Once, with the single insertion at its transmitted place. The sharḥ has no station specific to eyesight, and this entry does not pretend one — it is the tradition's reading for a pressing need (ḥāja), and the need you bring to it is your own. The full ḥizb is here to read; the general fortification reading is the ḥizb as it is, customarily after ʿAṣr.",
 read:"bahr",
 src:"Zarrūq, Sharḥ Ḥizb al-Baḥr — the closing chapter (the stations of intention)",
 grading:"C — the ṭarīqa's transmitted khawāṣṣ, from its authoritative commentator.",
 note:"For ease of affairs the same chapter sets al-Baqara 2:201 a hundred times before the litany's «اللَّهُمَّ يَسِّرْ لَنَا أُمُورَنَا»."},

{id:"ibnqayyim", grade:"C", presc:false, nm:"Ibn al-Qayyim's regimen notes",
 ar:"وَفِي الْكُحْلِ حِفْظٌ لِصِحَّةِ الْعَيْنِ وَتَقْوِيَةٌ لِلنُّورِ الْبَاصِرِ…",
 tl:"Zād al-Maʿād, the chapter on preserving eye health.",
 en:"Kohl preserves the eye's health and strengthens its light; his wider counsel: rest the eyes and guard them from harmful gazing.",
 how:"Documented in support of the ithmid Sunnah.",
 src:"Ibn al-Qayyim, Zād al-Maʿād; similarly al-Dhahabī, al-Ṭibb al-Nabawī.",
 grading:"C — a physician-scholar's judgment.", note:""},

/* ---------------- GRADE D ---------------- */
{id:"thumbs", grade:"D", presc:false, nm:"Thumb-kissing at the adhān — the full picture",
 ar:"تَقْبِيلُ الْإِبْهَامَيْنِ وَمَسْحُ الْعَيْنَيْنِ عِنْدَ «أَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللهِ» مَعَ: مَرْحَبًا بِحَبِيبِي وَقُرَّةِ عَيْنِي مُحَمَّدِ بْنِ عَبْدِ اللهِ",
 tl:"Kissing the thumbnails and wiping the eyes at the shahāda of the adhān.",
 en:"Both books record it — al-Dayrabī (p. 108, via the Khiḍr report) and Khazīnat al-Asrār (p. 80, with al-Qahistānī's wording «قُرَّتْ عَيْنِي بِكَ يَا رَسُولَ اللهِ» and the claim of safety from blindness and ramad). And the ḥadīth masters' verdict stands: al-Sakhāwī — 'nothing of all this authenticates as marfūʿ'; al-Shawkānī — 'it is not authentic.' Khazīna itself preserves both sides, citing al-Sakhāwī and then the view that acting on it without attributing it to the Prophet ﷺ remains open (the position of Mullā ʿAlī al-Qārī's school).",
 how:"Not set into the programs. Documented with its full transmission picture so you know exactly what exists and what the critics ruled.",
 src:"al-Daylamī, al-Firdaws · al-Sakhāwī, al-Maqāṣid 1021 · al-Shawkānī, al-Fawāʾid p. 20 · al-Dayrabī p. 108 · Khazīnat al-Asrār pp. 80–81",
 grading:"D as a Prophetic report — recorded in both mujarrabāt books; the amal-question is a live scholarly discussion.", note:""},

{id:"letters_swallow", grade:"D", presc:false, nm:"The swallowed letters of 'the Saturday of Light'",
 ar:"كَتْبُ الْحُرُوفِ النُّورَانِيَّةِ يَوْمَ سَبْتِ النُّورِ وَابْتِلَاعُهَا — أَمِنَ مِنَ الرَّمَدِ فِي تِلْكَ السَّنَةِ",
 tl:"Writing the fourteen luminous letters and swallowing them for a year's immunity from ramad.",
 en:"Recorded in al-Dayrabī (p. 109) from 'some books' — writing the Qurʾān's opening letters and swallowing them on a particular Saturday. No isnād, no named authority; kept here as documentation of the genre's edges.",
 how:"Not prescribed.", src:"al-Dayrabī, p. 109", grading:"D — anonymous custom within the book.", note:""},

{id:"greenery", grade:"D", presc:false, nm:"«Three things brighten the sight…» — aphorism, not ḥadīth",
 ar:"ثَلَاثٌ يُجَلِّينَ الْبَصَرَ: النَّظَرُ إِلَى الْخُضْرَةِ، وَإِلَى الْمَاءِ الْجَارِي، وَإِلَى الْوَجْهِ الْحَسَنِ",
 tl:"Greenery, running water, a beautiful face.",
 en:"Al-Sakhāwī traces it through a narrator of rejected material: it does not authenticate as the Prophet's ﷺ word. Resting the eyes on greenery and distance is wholesome habit — just never call it Sunnah.",
 how:"Not prescribed as ḥadīth.", src:"al-Sakhāwī, al-Maqāṣid al-Ḥasana no. 366.", grading:"D — not authentic as ḥadīth.", note:""}
];

<div class="tagline">The Sources</div>
<details class="sec" open><summary>The two books — and their own eyesight stories</summary><div class="inner">
<p><b>Fatḥ al-Malik al-Majīd (Mujarrabāt al-Dayrabī)</b> — Aḥmad al-Dayrabī al-Shāfiʿī of al-Azhar (d. 1151 AH). The 1322 AH print carries the mujarrabāt of Imam Muḥammad al-Ḥasanī in its margins. In his own colophon (p. 174) al-Dayrabī says the book lay unfinished for years — among the obstacles, <b>weakness of his eyesight</b> — "then Allah graced me with some illumination of my sight, and I began, little by little, to complete it." The book's eye material lives in Bāb 21 (the eye and the glance, p. 100) and Bāb 22 (ramad, from p. 107).</p>
<p><b>Khazīnat al-Asrār</b> — Sayyid Muḥammad Ḥaqqī al-Nāzillī (d. 1301 AH), the celebrated treasury of Qurʾānic khawāṣṣ, printed with the endorsement of al-Azhar's scholars. Its chapter "on the properties for the clearing of the eye, strength of sight, and removal of ramad and weakness" (p. 80) carries the author's own account: his sight failed in Makka after repeated cupping "until I could not study or read" — a scholar of India taught him the hundredfold <b>yā Baṣīr</b> after Jumuʿa in the Rawḍa of Madīna — "when I kept it, Allah removed the weakness of my sight," and he leaves a written ijāza for whoever perseveres.</p>
<p>Every citation carries its page number. Where the two books' wordings differ — the new-moon Fātiḥa count — the difference is shown, not resolved. The Ḥizb al-Baḥr entry rests on a third source: <b>Zarrūq's sharḥ of the litany</b>, its closing chapter of intentions.</p>
</div></details>

<div class="tagline">The Rules</div>
<details class="sec"><summary>The fiqh of ruqya — three conditions</summary><div class="inner">
<p>Ibn Ḥajar reports the scholars' consensus: ruqya is lawful <b>(1)</b> with Allah's words, Names and Attributes; <b>(2)</b> in Arabic or words whose meaning is known; <b>(3)</b> with the belief that it has no effect of itself — the effect is from Allah alone. Al-Nawawī: formulae of unknown meaning are blameworthy. This is why the ʿazāʾim in the books that use untranslated foreign Names — and the awfāq (talismanic squares) — are not carried into the programs, and why everything here is in plain Qurʾān, ṣalawāt, and known Arabic duʿāʾ.</p>
</div></details>

<div class="tagline">Understanding</div>
<details class="sec"><summary>Baṣar and baṣīra — the two sights</summary><div class="inner">
<p>The ʿāfiya duʿāʾ asks for the outer sight, three times each morning and evening. The Light duʿāʾ asks for light <i>in</i> the sight — and the commentators read that light first as guidance: the eye that sees things as they are. The Fajr wird of the masters joins the two: the believers' plea «رَبَّنَا أَتْمِمْ لَنَا نُورَنَا» crowned with the two Names — yā Nūr, yā Baṣīr. Whoever holds both petitions has asked for everything an eye can carry.</p>
</div></details>

<div class="tagline">المصادر</div>
<details class="sec" open><summary>الكتابان — وقصّتاهما مع البصر</summary><div class="inner">
<p><b>فتح الملك المجيد (مجرّبات الديربي)</b> — أحمد الديربي الشافعي الأزهري (ت ١١٥١هـ)، وطبعة ١٣٢٢هـ وبهامشها مجرّبات الإمام محمد الحسني. في خاتمة الكتاب (ص ١٧٤) يذكر الديربي أن الكتاب بقي سنين معطَّلًا، ومن موانعه <b>ضعف بصره</b> — «ثم منَّ الله عليَّ بتنوير البصر شيئًا فشرعت في إكماله». ومادة العين في الباب ٢١ (العين والنظرة، ص ١٠٠) والباب ٢٢ (الرمد، من ص ١٠٧).</p>
<p><b>خزينة الأسرار</b> — السيد محمد حقّي النازلّي (ت ١٣٠١هـ). وفي بابها «في الخصائص لانجلاء العين وقوة البصر» (ص ٨٠) حكاية المؤلف نفسه: ضعف بصره بمكة حتى عجز عن المطالعة، فعلَّمه رجل من علماء الهند في الروضة قراءة <b>«يا بصير» مائة مرة بعد صلاة الجمعة</b> — «فلما داومت عليها أزال الله ضعف بصري» — وترك إجازة مكتوبة لمن داوم.</p>
<p>كلُّ عزوٍ برقم صفحته. وحيث اختلفت الروايتان (عدد الفاتحة في عمل الهلال) عُرض الخلاف ولم يُحسم. وبطاقة حزب البحر قائمة على مصدر ثالث: <b>شرح الشيخ زرّوق للحزب</b>، فصلُ مقاصده الأخير.</p>
</div></details>
<div class="tagline">القواعد</div>
<details class="sec"><summary>فقه الرقية — شروطها الثلاثة</summary><div class="inner">
<p>نقل ابن حجر الإجماع: تجوز الرقية <b>(١)</b> بكلام الله وأسمائه وصفاته، <b>(٢)</b> وبالعربية أو بما يُعرف معناه، <b>(٣)</b> مع اعتقاد أنها لا تؤثر بذاتها بل بتقدير الله. وقال النووي: ما جُهل معناه مذموم. ولهذا لم تُحمل إلى برامجنا العزائمُ التي فيها أسماء أعجمية مجهولة ولا الأوفاق؛ وكلُّ ما هنا قرآنٌ صريح وصلواتٌ وأدعيةٌ معلومة المعنى.</p>
</div></details>
<div class="tagline">فهم</div>
<details class="sec"><summary>البصر والبصيرة — النظران</summary><div class="inner">
<p>دعاء العافية يسأل البصرَ الظاهر ثلاثًا صباحًا ومساء. ودعاء النور يسأل نورًا <i>في</i> البصر — وقد فهم الشُرّاح النور أولًا هدايةً: عينٌ ترى الأشياء كما هي، وتلك هي البصيرة. وورد الفجر عند المشايخ يجمعهما: ﴿رَبَّنَا أَتْمِمْ لَنَا نُورَنَا﴾ مع الاسمين: يا نور، يا بصير. فمن جمع الطلبين فقد سأل كلَّ ما تحمله عين.</p>
</div></details>

`,
tr:`
<div class="tagline">Kaynaklar</div>
<details class="sec" open><summary>İki kitap — ve kendi göz hikâyeleri</summary><div class="inner">
<p><b>Fethu'l-Meliki'l-Mecîd (Mücerrebât-ı Deyrebî)</b> — Ezherli Şâfiî âlim Ahmed ed-Deyrebî (v. 1151h). 1322h baskısının kenarında İmam Muhammed el-Hasenî'nin mücerrebâtı vardır. Deyrebî hâtimesinde (s. 174) kitabın yıllarca yarım kaldığını, engellerden birinin <b>gözlerinin zayıflaması</b> olduğunu söyler — “sonra Allah gözüme bir parça nur ihsan etti, ben de tamamlamaya koyuldum.” Göz bahisleri: Bâb 21 (nazar, s. 100) ve Bâb 22 (remed, s. 107'den itibaren).</p>
<p><b>Hazînetü'l-Esrâr</b> — Seyyid Muhammed Hakkı en-Nâzillî (v. 1301h). “Gözün cilâsı ve basar kuvveti” babında (s. 80) müellifin kendi şahitliği: Mekke'de gözleri okuyamayacak kadar zayıfladı; Ravza'da Hindli bir âlim ona <b>Cuma namazından sonra yüz kere “yâ Basîr”</b> okumayı öğretti — “devam edince Allah gözümün zayıflığını giderdi” — ve devam edene yazılı icâzet bıraktı.</p>
<p>Her alıntı sayfa numarasıyladır. İki rivayetin ayrıştığı yerde (hilâl amelindeki Fâtiha sayısı) fark gösterildi, karara bağlanmadı. Hizbü'l-Bahr kaydı üçüncü bir kaynağa dayanır: <b>Şeyh Zerrûk'un hizb şerhi</b> — niyet makamları faslı.</p>
</div></details>
<div class="tagline">Kurallar</div>
<details class="sec"><summary>Rukye fıkhı — üç şart</summary><div class="inner">
<p>İbn Hacer icmâyı nakleder: rukye <b>(1)</b> Allah'ın kelâmı, isim ve sıfatlarıyla, <b>(2)</b> Arapça veya mânâsı bilinen sözlerle, <b>(3)</b> tesirin yalnız Allah'tan olduğuna itikatla câizdir. Nevevî: mânâsı bilinmeyen mezmûmdur. Bu yüzden kitaplardaki yabancı-isimli azîmeler ve vefkler programlara alınmadı; buradaki her şey açık Kur'ân, salavât ve mânâsı bilinen duadır.</p>
</div></details>
<div class="tagline">Anlayış</div>
<details class="sec"><summary>Basar ve basîret — iki görüş</summary><div class="inner">
<p>Âfiye duası zâhir gözü ister; sabah akşam üçer kere. Nur duası ise görüşe nur ister — şârihler bu nuru önce hidayet diye okudu: eşyayı olduğu gibi gören göz; basîret budur. Üstadların fecir virdi ikisini birleştirir: “Rabbimiz, nûrumuzu tamamla” (66:8) ve iki isim: yâ Nûr, yâ Basîr. İki talebi birleştiren, bir gözün taşıyabileceği her şeyi istemiştir.</p>
</div></details>
<div class="footer">Basîra — Nebevî metinler kaynaklarına; mücerrebât, Hazînetü'l-Esrâr (s. 80) ile Fethu'l-Meliki'l-Mecîd (s. 100–109, 174) sayfalarına; hizb, Zerrûk şerhine dayanır.<br>İbadet rehberidir; fetva ve tıbbî tavsiye değildir. Tesir yalnız Allah'ındır.</div>
`

 tr:{nm:"Nazar guslü — göz değmesinde Sünnet", en:"Nazarı değen kişiye yıkanması emredilir — yüzü, elleri, dirsekleri, dizleri, ayak uçları ve izârının içi — sonra su, nazarlanana dökülür. Peygamber ﷺ beğenene bereket duasını öğretti: “Allah'ım, onu mübarek kıl, ona zarar verme.”", how:"Nakledildiği gibidir; Deyrebî bunu “Peygamber'in ﷺ emrettiği denenmiş devalar” içinde verir (Bâb 21).", src:"Asıl: Müslim 2188 ve Sehl b. Huneyf kıssası · Deyrebî s. 103", grading:"Sahih (asıl hadis).", note:"Göz değmesine Sünnet'in cevabı — ve korunması: beğenenin bereket duası."}},
khaybar:{
 ar:{nm:"شفاء النبي ﷺ للعين — أصلُ النفث", en:"بصق النبي ﷺ في عيني عليٍّ يوم خيبر ودعا له، فبرأ حتى كأن لم يكن به وجع.", how:"ليست عملًا يوميًّا — بل سابقةٌ نبوية تؤصِّل النفثَ على العينين الجاري في مجرّبات هذا الباب.", src:"البخاري ٤٢١٠ (و٢٩٤٢، ٣٧٠١) · مسلم ٢٤٠٦", grading:"صحيح — وهو الشفاء النبوي الوحيد الخاص بالعين الثابت.", note:"وثَمَّ خبرٌ آخر بعودة بصر أعمى عند نفثه ﷺ (حبيب بن مدرك) وسندُه ضعيف — علامة نبوة لا عملٌ يُنقل."},
 tr:{nm:"Peygamber'in ﷺ gözü şifası — nefesin dayanağı", en:"Peygamber ﷺ Hayber'de Ali'nin gözlerine mübarek tükürüğünü sürdü ve ona dua etti; hiç ağrısı yokmuş gibi anında iyileşti.", how:"Günlük bir amel değil — bu babın mücerrebâtındaki göze üflemenin dayanağı olan nebevî bir örnektir.", src:"Buhârî 4210 (ayrıca 2942, 3701) · Müslim 2406", grading:"Sahih — göze özgü, sağlam nakledilmiş tek nebevî şifadır.", note:"Bir âmânın gözünün Peygamber'in ﷺ üflemesiyle açıldığına dair başka bir haber de vardır (Habîb b. Müdrik); senedi zayıftır — nübüvvet alâmeti, nakledilir bir amel değil."}},
ithmid:{
 ar:{nm:"الاكتحال بالإثمد — سنّة البصر", en:"عليكم بالإثمد فإنه يجلو البصر وينبت الشعر.", how:"عند النوم وترًا: ثلاثًا في كل عين، أو ثلاثًا في اليمنى واثنتين في اليسرى — كلاهما ثابت.", src:"المتن: الترمذي ١٧٥٧ · ابن ماجه ٣٤٩٧ · أبو داود ٣٨٧٨ (صحيح، الألباني: صحيح الجامع ١١٩٧) · ورواية ٣ يمنى و٢ يسرى: أنس، السلسلة الصحيحة ٦٣٣", grading:"صحيح — بمجموع طرقه.", note:"قال ابن القيم في زاد المعاد: «في الكحل حفظ لصحة العين وتقوية للنور الباصر… وللإثمد من ذلك خاصية»."},
 tr:{nm:"İsmid sürmesi — basar Sünneti", en:"İsmide devam edin; çünkü o gözü cilâlar ve kirpiği bitirir.", how:"Uykudan önce, tek sayıyla: her göze üçer, ya da sağa üç sola iki — ikisi de sabittir.", src:"Metin: Tirmizî 1757 · İbn Mâce 3497 · Ebû Dâvûd 3878 (sahih, Elbânî: Sahîhu'l-Câmi 1197) · sağ 3 / sol 2 rivayeti: Enes, es-Silsiletü's-Sahîha 633", grading:"Sahih — yollarının toplamıyla.", note:"İbnü'l-Kayyim, Zâdü'l-Meâd: “Sürmede göz sağlığını koruma ve gören nuru güçlendirme vardır… ismidin bunda ayrı bir hâssası vardır.”"}},
yabasir:{
 ar:{nm:"«يا بصير» — البصير، بعد الصلاة", en:"يا بصير — ثم المسح على العينين مع: اللهم قوِّ بصري بحرمة اسمك البصير.", how:"يُداوَم عليه بعد الصلاة، مع المسح والدعاء. والاسم هو الأصل؛ والعدد عددك.", src:"اسم الله «البصير» (الشورى ٤٢:١١). وصيغة «مائة بعد الجمعة» تتداول في مجموعٍ من الخواص لا تثبت نسبتُه الكلاسيكية — فلا يُثبَت هنا عدد.", grading:"ج — اسمٌ من أسماء الله؛ والصيغة المعدودة متنازَعٌ في نسبتها.", note:"وأصله الصحيح دعاءُ التمتّع «متِّعني بسمعي وبصري» — وهو صحيحٌ بذاته (انظر «متِّعنا بأسماعنا وأبصارنا»)."},
 tr:{nm:"«Yâ Basîr» — el-Basîr, namazdan sonra", en:"Yâ Basîr — sonra gözleri mesh ederek: Allah'ım, Basîr isminin hürmetine gözümü kuvvetlendir.", how:"Namazdan sonra devam edilir, mesh ve dua ile. İsim asıldır; sayı senindir.", src:"Allah'ın ismi el-Basîr (Şûrâ 42:11). «Cuma'dan sonra yüz» formu, klasik nispeti sabit olmayan bir havâss derlemesinde dolaşır — bu yüzden burada sayı sabitlenmez.", grading:"C — Allah'ın bir ismi; sayılı form nispet bakımından tartışmalı.", note:"Sahih dayanağı «göz ve kulaktan faydalandır» duasıdır — kendi başına sahihtir («İşitmemizi ve görmemizi bize nimet kıl»a bakınız)."}},
fajr15:{
 ar:{nm:"ورد الفجر ١٥ — «ربنا أتمم لنا نورنا»", en:"ربنا أتمم لنا نورنا واغفر لنا إنك على كل شيء قدير، يا نور يا بصير (١٥ مرة)؛ ثم: يا رب (خمسًا)، قوِّ بصري، اللهم اشف أنت الشافي، اللهم عاف أنت المعافي.", how:"كل يوم بين سنة الصبح وفريضته، واليد على الجبهة — كما في الكتاب.", src:"الديربي، فتح الملك المجيد ص ١٠٨ («أفادني بعض الإخوان»)", grading:"ج — من جنس المجرّبات؛ ودعوى الكتاب: «لم يرمد أبدًا بقدرة الله».", note:"مبني على آية نور المؤمنين (التحريم ٦٦:٨) وعلى الاسمين اللذين يقوم عليهما هذا التطبيق."},
 tr:{nm:"Fecir virdi 15 — “Rabbimiz, nûrumuzu tamamla”", en:"Rabbimiz! Nûrumuzu tamamla ve bizi bağışla; Sen her şeye kadirsin — yâ Nûr, yâ Basîr (15 kere); sonra: yâ Rabbi (5 kere), gözümü kuvvetlendir; Allah'ım şifa ver, Şâfî Sensin; âfiyet ver, Muâfî Sensin.", how:"Her gün, sabah namazının sünneti ile farzı arasında, el alında — kitabın verdiği gibi.", src:"Deyrebî, Fethu'l-Meliki'l-Mecîd s. 108 (“kardeşlerden biri bana bildirdi”)", grading:"C — mücerrebât türünden; kitabın iddiası: “Allah'ın kudretiyle asla remed görmez.”", note:"Müminlerin nur âyeti (Tahrîm 66:8) ve bu uygulamanın iki ismi üzerine kuruludur."}},
qaf7:{
 ar:{nm:"آية ق على الإبهامين ٧ — «لنور البصر»", en:"فكشفنا عنك غطاءك فبصرك اليوم حديد — سبعًا على ظهري الإبهامين، مع الصلاة على النبي ﷺ في كل مرة، ثم المسح على العينين.", how:"كما نُقل عن الشيخ فريد الدين، الولي المشهور ببلاد الهند — «نافع لنور البصر وزوال الضرر عن العينين إن شاء الله».", src:"في الكتابين معًا: خزينة الأسرار ص ٨٠، والديربي ص ١٠٨", grading:"ج — مجرَّبُ عَلَمٍ مسمّى، بنقلين مستقلين.", note:"الآية في التفسير في المبعوث المكشوف غطاؤه؛ وتقليب الخواص لفظَها دعاءً عادةُ هذا الفن — والوجهان معروضان."},
 tr:{nm:"Baş parmaklara Kâf âyeti 7 — “görme nuru için”", en:"“Senden perdeni kaldırdık; bugün gözün pek keskindir” — baş parmak tırnaklarına yedi kere, her seferinde salavatla; sonra parmaklarla gözleri mesh.", how:"Hindistan'ın meşhur velîsi Şeyh Ferîdüddin'den nakledildiği gibi — “görme nuruna ve gözlerden zararın gitmesine faydalıdır, inşaallah.”", src:"İki kitapta birden: Hazîne s. 80 ve Deyrebî s. 108", grading:"C — isimli bir üstadın mücerrebi, iki bağımsız nakil.", note:"Âyet tefsirde perdesi açılanın hâlidir; havâss geleneği lafzını duaya çevirir — iki bakış da gösterilmiştir."}},
nur3:{
 ar:{nm:"آية النور على العينين — ٣ صباحًا ومساءً", en:"بسم الله الرحمن الرحيم، دخل الرمد بسلامة ويخرج الرمد بسلامة… ثم: الله نور السموات والأرض… إلى: نور على نور.", how:"تُقرأ على العينين ثلاثًا كل صباح ومساء — «فإن الرمد يذهب بإذن الله».", src:"عن كتاب «شفاء الصدور والأبدان في سر منافع القرآن»، نقله الديربي ص ١٠٨", grading:"ج — عملٌ سنّي معدود بآية النور (وثَمَّ نظيرٌ شيعي؛ وهذا هو المصدر السنّي).", note:""},
 tr:{nm:"Gözlere Nûr âyeti — sabah akşam 3", en:"Bismillâhirrahmânirrahîm; remed selâmetle girdi, selâmetle çıkar… sonra: “Allah göklerin ve yerin nûrudur…” — “nur üstüne nur”a kadar.", how:"Her sabah ve akşam gözlere üç kere okunur — “remed Allah'ın izniyle gider.”", src:"“Şifâü's-sudûr ve'l-ebdân” kitabından; Deyrebî s. 108'de nakleder", grading:"C — sayılı Sünnî bir Nûr âyeti ameli (bir Şiî benzeri de vardır; bu, Sünnî kaynaktır).", note:""}},
banuri:{
 ar:{nm:"عمل البصر بعد كل صلاة — ق ٥٠:٢٢ · يا نور · «سميعًا بصيرًا»", en:"بعد كل فريضة: ﴿فكشفنا عنك غطاءك فبصرك اليوم حديد﴾ (١١)، يا نور (١١)، ﴿فجعلناه سميعًا بصيرًا﴾ (٧٦:٢) (١١)؛ ثم ينفث في أصابعه ويمسح بها عينيه.", how:"بعد كل صلاة مفروضة — إحدى عشرة من كلٍّ، ثم المسح. الآيات قرآن، والأعداد والكيفية من إفتاء المفتين.", src:"جامعة العلوم الإسلامية بنوري تاون، كراتشي — فتوى رقم ١٤٤٥٠٧١٠١٤٣٨", grading:"ج — عملٌ موصوفٌ من دار إفتاءٍ ديوبندية مسمّاة (من جنس المجرّبات لا الحديث).", note:"أوفى روتينٍ للبصر توثيقًا ونسبةً مؤسسية في هذه المجموعة — وأساسٌ طبيعي لبرنامجٍ بعد كل صلاة."},
 tr:{nm:"Her namazdan sonra göz ameli — Kâf 50:22 · Yâ Nûr · «semîan basîran»", en:"Her farzdan sonra: «Senden perdeni kaldırdık; bugün gözün keskindir» (11), Yâ Nûr (11), «onu işiten ve gören yaptık» (76:2) (11); sonra parmaklara üfleyip gözleri mesh eder.", how:"Her farz namazdan sonra — her birinden on bir, sonra mesh. Âyetler Kur'ân; sayılar ve usûl müftîlerin tavsiyesidir.", src:"Câmia Ulûm-i İslâmiyye Bennûrî Town, Karaçi — dârü'l-iftâ fetvâ no. 144507101438", grading:"C — isimli bir Deobendî dârü'l-iftâsından tavsiye edilen amel (mücerrebât türü, hadis değil).", note:"Bu külliyattaki en ayrıntılı ve kurumsal kaynaklı göz rutini — her namazdan sonraki bir program için doğal omurga."}},
hilal:{
 ar:{nm:"عمل الهلال", en:"عند رؤية الهلال: يمسح بيمينه على عينيه ويقرأ الفاتحة (عشرًا، وفي الخزينة: خمسًا) يبسمل كل مرة؛ ثم الإخلاص ثلاثًا؛ ثم: شفاء من كل داء برحمتك يا أرحم الراحمين (سبعًا)؛ ثم: يا رب (خمسًا) قوِّ بصري…", how:"شهريًّا عند رؤية الهلال. واختلف الكتابان في عدد الفاتحة (عشر/خمس) — فعُرض الخلاف ولم يُحسم.", src:"الديربي ص ١٠٨ · خزينة الأسرار ص ٨٠ — والكتابان يسوقانه مساق الرواية، وإسناده غير ثابت: فيُؤخذ عملَ أهل هذا الفن.", grading:"ج — منقول في كتابي المجرّبات معًا.", note:""},
 tr:{nm:"Hilâl ameli", en:"Hilâli ilk görünce: sağ elle gözleri mesh edip Fâtiha okunur (10 kere; Hazîne'de: 5), her kerede besmeleyle; sonra İhlâs 3; sonra “her derde şifa, rahmetinle ey merhametlilerin en merhametlisi” 7 kere; sonra yâ Rabbi 5 kere, gözümü kuvvetlendir…", how:"Her ay, hilâl görüldüğünde. İki kitap Fâtiha sayısında ayrılır (10/5) — fark gösterildi, karara bağlanmadı.", src:"Deyrebî s. 108 · Hazîne s. 80 — kitaplar rivayet üslûbuyla verir; isnadı sabit değildir: bu ilmin ehlinin ameli olarak alınır.", grading:"C — iki mücerrebât kitabında birden.", note:""}},
rosewater:{
 ar:{nm:"ماء الورد عند الشروق — المجرَّب اللطيف", en:"«وإذا فُتحت العينان في ماء ورد عند طلوع الشمس زاد في ضوء البصر زيادة بليغة».", how:"كما في الكتاب. وبحسّ العصر: ماء ورد معقّم صالح للعين فقط؛ ويُترك عند أي تهيّج؛ وليس علاجًا لمرض.", src:"الديربي ص ١٠٩", grading:"ج — بوسم الكتاب: مجرَّب.", note:""},
 tr:{nm:"Gün doğarken gül suyu — en yumuşak mücerreb", en:"“Gözler gün doğarken gül suyu içinde açılırsa görme ışığı belirgin şekilde artar.”", how:"Kitabın verdiği gibidir. Günümüz aklıyla: yalnız göz için uygun steril gül suyu; tahrişte bırakılır; hiçbir göz hastalığının tedavisi değildir.", src:"Deyrebî s. 109", grading:"C — kitabın kaydıyla: mücerreb.", note:""}},
ramad_kitaba:{
 ar:{nm:"كتابة الرمد — قميص يوسف وآية ق", en:"يُكتب بزعفران وماء ورد: ﴿اذهبوا بقميصي هذا…﴾ و﴿فكشفنا عنك غطاءك…﴾ و«اللهم أذهب الرمد…» — ويستمر النص بفواتح الكهف ومريم.", how:"موثَّق كما في الكتاب (جنس الكتابة). لم يوضع في البرامج؛ وعُرض ليُعرف نصُّ التراث بعينه.", src:"الديربي ص ١٠٧–١٠٨", grading:"ج — من كتابات المجرّبات.", note:"«كتابة قميص يوسف»، كما يوردها الديربي بصفحته."},
 tr:{nm:"Remed yazısı — Yûsuf'un gömleği ve Kâf âyeti", en:"Safran ve gül suyuyla yazılır: “Şu gömleğimi götürün…” (12:93), “Perdeni kaldırdık…” (50:22) ve “Allah'ım, remedi gider…” — metin Kehf ve Meryem'in fâtihalarıyla sürer.", how:"Kitaptaki gibi belgelenmiştir (kitâbet türü). Programlara konmadı; geleneğin gerçek metni bilinsin diye gösterildi.", src:"Deyrebî s. 107–108", grading:"C — mücerrebât kitâbeti.", note:"“Yûsuf'un gömleği” yazısı; Deyrebî'de, sayfasıyla."}},
bahr_haja:{
 ar:{nm:"حزب البحر — قراءة الحاجة المتعقّدة",
  en:"يُختم شرح الشيخ زرّوق بمقاصد النية لحزب الإمام الشاذلي. للأمر المتعقّد المتوقف: قراءة واحدة كاملة، وتُجعل دعوةُ شعيب للفتح مرةً واحدة عند طلب الحزب نفسِه للفتح — ثم تمضي القراءة.",
  how:"مرة واحدة، والزيادة في موضعها المنقول. وليس في الشرح مقصدٌ خاص بالبصر — ولا تدّعي هذه البطاقة ذلك؛ إنما هي قراءة التراث للحاجة الملحّة، وحاجتُك أنت ما تحمله إليها. والحزب كاملًا هنا للقراءة؛ والقراءة العامة للتحصين: الحزب كما هو، والعادة بعد العصر.",
  src:"زرّوق، شرح حزب البحر — الفصل الأخير (مقاصد النية)",
  grading:"ج — خواصّ الطريقة المنقولة عن شارحها المعتمد.",
  note:"ولتيسير الأمور جعل الفصلُ نفسُه ﴿رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً…﴾ مائة مرة قبل «اللهم يسّر لنا أمورنا»."},
 tr:{nm:"Hizbü'l-Bahr — düğümlenmiş hâcet okuyuşu",
  en:"Şeyh Zerrûk'un şerhi, İmam Şâzelî'nin deniz hizbinin niyet makamlarıyla kapanır. Düğümlenmiş, tıkanmış iş için: bir tam okuyuş; Şuayb'ın fetih duası, hizbin kendi fetih niyazının yerinde bir kez eklenir — sonra okuyuş akar.",
  how:"Bir kez; ekleme, nakledilen yerinde. Şerhte göze özgü bir makam yoktur — bu kayıt öyle bir iddia taşımaz; bu, geleneğin acil hâcet okuyuşudur ve ona taşıdığın hâcet senindir. Tam hizb burada okunmak üzere yer alır; genel tahsin okuyuşu ise hizbin olduğu gibi, âdet üzere ikindiden sonra okunmasıdır.",
  src:"Zerrûk, Şerhu Hizbi'l-Bahr — son fasıl (niyet makamları)",
  grading:"C — tarikatın muteber şârihinden nakledilen havâss.",
  note:"İşlerin kolaylaşması için aynı fasıl, «Allahümme yessir lenâ umûranâ»dan önce Bakara 2:201'i yüz kez koyar."}},
husn_fortress:{
 ar:{nm:"«حصّنتكم بالحي القيوم»", en:"حصنتكم بالحي القيوم الذي لا يموت أبدًا، ودفعت عنكم السوء بألف ألف لا حول ولا قوة إلا بالله العلي العظيم.", how:"يقال على من تخاف عليهم — أورده الديربي (عن القاضي حسين، في نبيٍّ حصَّن قومه من العين) في باب العين والنظرة.", src:"الديربي ص ١٠٣", grading:"ج — وله قريبٌ من الدرجة أ: فالحي القيوم منقول في اسم الله الأعظم (حديث أسماء بنت عميس).", note:""},
 tr:{nm:"“Sizi ölümsüz Hayy ve Kayyûm ile korudum”", en:"Sizi, asla ölmeyen Hayy ve Kayyûm ile korudum; kötülüğü sizden milyon kere 'lâ havle ve lâ kuvvete illâ billâhi'l-aliyyi'l-azîm' ile savdım.", how:"Korkulanlar üzerine söylenir — Deyrebî (Kadı Hüseyin'den; kavmini nazardan koruyan bir peygamber kıssasıyla) nazar babında verir.", src:"Deyrebî s. 103", grading:"C — A derecesinden bir yakını vardır: Hayy–Kayyûm, İsm-i A'zam rivayetindedir (Esmâ bint Umeys hadisi).", note:""}},
ibnqayyim:{
 ar:{nm:"فوائد ابن القيم في حفظ العين (توثيق)", en:"«في الكحل حفظ لصحة العين وتقوية للنور الباصر…» — ووصيته العامة: راحة العين وصونها عن النظر الضار.", how:"موثَّق تأييدًا لسنّة الإثمد.", src:"ابن القيم، زاد المعاد (فصل حفظ صحة العين)؛ ونحوه للذهبي في الطب النبوي.", grading:"ج — حكم عالمٍ طبيبٍ مسمّى.", note:""},
 tr:{nm:"İbnü'l-Kayyim'in göz koruma notları (kayıt)", en:"“Sürmede göz sağlığını koruma ve gören nuru güçlendirme vardır…” — genel öğüdü: gözü dinlendirmek ve zararlı bakıştan korumak.", how:"İsmid Sünnetini destekleyen kayıt.", src:"İbnü'l-Kayyim, Zâdü'l-Meâd; benzeri Zehebî, et-Tıbbü'n-Nebevî.", grading:"C — isimli bir âlim-tabibin hükmü.", note:""}},
thumbs:{
 ar:{nm:"تقبيل الإبهامين عند الأذان — الصورة كاملة", en:"ذكره الكتابان — الديربي (ص ١٠٨، عن خبر الخضر) والخزينة (ص ٨٠، بلفظ القهستاني «قرت عيني بك يا رسول الله» ودعوى الأمان من العمى والرمد). وحكم الحفّاظ قائم: قال السخاوي «ولم يصح في المرفوع من كل هذا شيء»، وقال الشوكاني «لا يصح». والخزينة نفسها حفظت القولين، ومعهما قولُ من أجاز العمل من غير رفع (مسلك القاري).", how:"ليس في البرامج. وُثِّق بصورته التامة لتعرف ما هو وما قال فيه النقّاد.", src:"الديلمي، الفردوس · السخاوي، المقاصد ١٠٢١ · الشوكاني، الفوائد ص ٢٠ · الديربي ص ١٠٨ · الخزينة ص ٨٠–٨١", grading:"د مرفوعًا — وذكره كتابا المجرّبات؛ ومسألة العمل بحثٌ حي.", note:""},
 tr:{nm:"Ezanda baş parmak öpme — tam tablo", en:"İki kitap da kaydeder — Deyrebî (s. 108, Hızır haberiyle) ve Hazîne (s. 80, Kuhistânî'nin “gözüm seninle aydın oldu yâ Resûlallah” lafzı ve körlükten emniyet iddiasıyla). Hâfızların hükmü yerindedir: Sehâvî “bunların hiçbiri merfû olarak sahih değildir”, Şevkânî “sahih değildir” dedi. Hazîne'nin kendisi iki görüşü de korur; yanında, merfû saymadan amel edenlerin yolu (Aliyyü'l-Kârî'nin mesleği).", how:"Programlarda yoktur. Ne olduğu ve münekkitlerin ne dediği bilinsin diye tam haliyle kaydedildi.", src:"Deylemî, el-Firdevs · Sehâvî, el-Makâsıd 1021 · Şevkânî, el-Fevâid s. 20 · Deyrebî s. 108 · Hazîne s. 80–81", grading:"Merfû olarak D — iki mücerrebât kitabı kaydeder; amel meselesi canlı bir bahistir.", note:""}},

greenery:{
 ar:{nm:"«ثلاث يجلين البصر» — حكمة لا حديث", en:"النظر إلى الخضرة والماء الجاري والوجه الحسن — تتبّعه السخاوي (المقاصد ٣٦٦) فإذا في طريقه من في حديثه نكارة: فلا يثبت مرفوعًا. وإراحة العين بالخضرة والمدى عادة حسنة — لكن لا تُسمِّها سنّة.", how:"لا يُنسب حديثًا.", src:"السخاوي، المقاصد الحسنة ٣٦٦", grading:"د — لا يصح حديثًا.", note:""},
