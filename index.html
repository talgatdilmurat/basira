const BAHR={"insertAfter":6,"insert":{"ar":"رَبَّنَا افْتَحْ بَيْنَنَا وَبَيْنَ قَوْمِنَا بِالْحَقِّ وَأَنْتَ خَيْرُ الْفَاتِحِينَ","tl":"Rabbanā ftaḥ baynanā wa-bayna qawminā bi-l-ḥaqqi wa-anta khayru l-fātiḥīn.","ref":"al-Aʿrāf 7:89"},"open":[{"ar":"بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ"},{"ar":"رَبِّ يَسِّرْ وَلَا تُعَسِّرْ عَلَيْنَا، يَا مُيَسِّرَ كُلِّ عَسِيرٍ"},{"ar":"لَا إِلَهَ إِلَّا اللهُ، مُحَمَّدٌ رَسُولُ اللهِ"},{"ar":"اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلِّمْ تَسْلِيمًا"},{"ar":"سُورَةُ الْفَاتِحَةِ"}],"paras":[{"ar":"يَا اللهُ يَا عَلِيُّ يَا عَظِيمُ يَا حَلِيمُ يَا عَلِيمُ، أَنْتَ رَبِّي وَعِلْمُكَ حَسْبِي، فَنِعْمَ الرَّبُّ رَبِّي وَنِعْمَ الحَسْبُ حَسْبِي، تَنْصُرُ مَنْ تَشَاءُ وَأَنْتَ العَزِيزُ الرَّحِيمُ","tl":"Yā Allāhu yā ʿAliyyu yā ʿAẓīmu yā Ḥalīmu yā ʿAlīm, anta Rabbī wa-ʿilmuka ḥasbī, fa-niʿma r-Rabbu Rabbī wa-niʿma l-ḥasbu ḥasbī, tanṣuru man tashāʾu wa-anta l-ʿAzīzu r-Raḥīm."},{"ar":"نَسْأَلُكَ العِصْمَةَ فِي الحَرَكَاتِ وَالسَّكَنَاتِ وَالكَلِمَاتِ وَالإِرَادَاتِ وَالخَطَرَاتِ، مِنَ الشُّكُوكِ وَالظُّنُونِ وَالأَوْهَامِ السَّاتِرَةِ لِلْقُلُوبِ عَنْ مُطَالَعَةِ الغُيُوبِ","tl":"Nasʾaluka l-ʿiṣmata fi l-ḥarakāti wa-s-sakanāti wa-l-kalimāti wa-l-irādāti wa-l-khaṭarāt, mina sh-shukūki wa-ẓ-ẓunūni wa-l-awhāmi s-sātirati li-l-qulūbi ʿan muṭālaʿati l-ghuyūb."},{"ar":"فَقَدِ ابْتُلِيَ المُؤْمِنُونَ وَزُلْزِلُوا زِلْزَالًا شَدِيدًا، وَإِذْ يَقُولُ المُنَافِقُونَ وَالَّذِينَ فِي قُلُوبِهِمْ مَرَضٌ مَا وَعَدَنَا اللهُ وَرَسُولُهُ إِلَّا غُرُورًا","tl":"Fa-qadi btuliya l-muʾminūna wa-zulzilū zilzālan shadīdā, wa-idh yaqūlu l-munāfiqūna wa-lladhīna fī qulūbihim maraḍun mā waʿadana Llāhu wa-rasūluhu illā ghurūrā."},{"ar":"فَثَبِّتْنَا وَانْصُرْنَا وَسَخِّرْ لَنَا هَذَا البَحْرَ كَمَا سَخَّرْتَ البَحْرَ لِمُوسَى، وَسَخَّرْتَ النَّارَ لِإِبْرَاهِيمَ، وَسَخَّرْتَ الجِبَالَ وَالحَدِيدَ لِدَاوُدَ، وَسَخَّرْتَ الرِّيحَ وَالشَّيَاطِينَ وَالجِنَّ لِسُلَيْمَانَ، وَسَخِّرْ لَنَا كُلَّ بَحْرٍ هُوَ لَكَ فِي الأَرْضِ وَالسَّمَاءِ وَالمُلْكِ وَالمَلَكُوتِ، وَبَحْرَ الدُّنْيَا وَبَحْرَ الآخِرَةِ، وَسَخِّرْ لَنَا كُلَّ شَيْءٍ","tl":"Fa-thabbitnā wa-nṣurnā wa-sakhkhir lanā hādha l-baḥra kamā sakhkharta l-baḥra li-Mūsā, wa-sakhkharta n-nāra li-Ibrāhīm, wa-sakhkharta l-jibāla wa-l-ḥadīda li-Dāwūd, wa-sakhkharta r-rīḥa wa-sh-shayāṭīna wa-l-jinna li-Sulaymān, wa-sakhkhir lanā kulla baḥrin huwa laka fi l-arḍi wa-s-samāʾi wa-l-mulki wa-l-malakūt, wa-baḥra d-dunyā wa-baḥra l-ākhira, wa-sakhkhir lanā kulla shayʾ."},{"ar":"يَا مَنْ بِيَدِهِ مَلَكُوتُ كُلِّ شَيْءٍ","tl":"Yā man bi-yadihi malakūtu kulli shayʾ."},{"ar":"كهيعص &#1750; كهيعص &#1750; كهيعص","tl":"Kāf–Hā–Yā–ʿAyn–Ṣād (three times)"},{"ar":"اُنْصُرْنَا فَإِنَّكَ خَيْرُ النَّاصِرِينَ","tl":"Unṣurnā fa-innaka khayru n-nāṣirīn."},{"ar":"وَافْتَحْ لَنَا فَإِنَّكَ خَيْرُ الفَاتِحِينَ","tl":"Wa-ftaḥ lanā fa-innaka khayru l-fātiḥīn."},{"ar":"وَاغْفِرْ لَنَا فَإِنَّكَ خَيْرُ الغَافِرِينَ","tl":"Wa-ghfir lanā fa-innaka khayru l-ghāfirīn."},{"ar":"وَارْحَمْنَا فَإِنَّكَ خَيْرُ الرَّاحِمِينَ","tl":"Wa-rḥamnā fa-innaka khayru r-rāḥimīn."},{"ar":"وَارْزُقْنَا فَإِنَّكَ خَيْرُ الرَّازِقِينَ","tl":"Wa-rzuqnā fa-innaka khayru r-rāziqīn."},{"ar":"وَاهْدِنَا وَنَجِّنَا مِنَ القَوْمِ الظَّالِمِينَ","tl":"Wa-hdinā wa-najjinā mina l-qawmi ẓ-ẓālimīn."},{"ar":"وَهَبْ لَنَا رِيحًا طَيِّبَةً كَمَا هِيَ فِي عِلْمِكَ","tl":"Wa-hab lanā rīḥan ṭayyibatan kamā hiya fī ʿilmik."},{"ar":"وَانْشُرْهَا عَلَيْنَا مِنْ خَزَائِنِ رَحْمَتِكَ","tl":"Wa-nshurhā ʿalaynā min khazāʾini raḥmatik."},{"ar":"وَاحْمِلْنَا بِهَا حَمْلَ الكَرَامَةِ مَعَ السَّلَامَةِ وَالعَافِيَةِ فِي الدِّينِ وَالدُّنْيَا وَالآخِرَةِ، إِنَّكَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ","tl":"Wa-ḥmilnā bihā ḥamla l-karāmati maʿa s-salāmati wa-l-ʿāfiyati fi d-dīni wa-d-dunyā wa-l-ākhira, innaka ʿalā kulli shayʾin qadīr."},{"ar":"اللَّهُمَّ يَسِّرْ لَنَا أُمُورَنَا مَعَ الرَّاحَةِ لِقُلُوبِنَا وَأَبْدَانِنَا، وَالسَّلَامَةِ وَالعَافِيَةِ فِي دِينِنَا وَدُنْيَانَا","tl":"Allāhumma yassir lanā umūranā maʿa r-rāḥati li-qulūbinā wa-abdāninā, wa-s-salāmati wa-l-ʿāfiyati fī dīninā wa-dunyānā."},{"ar":"وَكُنْ لَنَا صَاحِبًا فِي سَفَرِنَا، وَخَلِيفَةً فِي أَهْلِنَا، وَاطْمِسْ عَلَى وُجُوهِ أَعْدَائِنَا، وَامْسَخْهُمْ عَلَى مَكَانَتِهِمْ فَلَا يَسْتَطِيعُونَ المُضِيَّ وَلَا المَجِيءَ إِلَيْنَا","tl":"Wa-kun lanā ṣāḥiban fī safarinā, wa-khalīfatan fī ahlinā, wa-ṭmis ʿalā wujūhi aʿdāʾinā, wa-msakh-hum ʿalā makānatihim fa-lā yastaṭīʿūna l-muḍiyya wa-la l-majīʾa ilaynā."},{"ar":"وَلَوْ نَشَاءُ لَطَمَسْنَا عَلَى أَعْيُنِهِمْ فَاسْتَبَقُوا الصِّرَاطَ فَأَنَّى يُبْصِرُونَ &#1750; وَلَوْ نَشَاءُ لَمَسَخْنَاهُمْ عَلَى مَكَانَتِهِمْ فَمَا اسْتَطَاعُوا مُضِيًّا وَلَا يَرْجِعُونَ","tl":"Wa-law nashāʾu la-ṭamasnā ʿalā aʿyunihim fa-stabaqu ṣ-ṣirāṭa fa-annā yubṣirūn; wa-law nashāʾu la-masakhnāhum ʿalā makānatihim fa-mā staṭāʿū muḍiyyan wa-lā yarjiʿūn."},{"ar":"يس &#1750; وَالقُرْآنِ الحَكِيمِ &#1750; إِنَّكَ لَمِنَ المُرْسَلِينَ &#1750; عَلَى صِرَاطٍ مُسْتَقِيمٍ &#1750; تَنْزِيلَ العَزِيزِ الرَّحِيمِ &#1750; لِتُنْذِرَ قَوْمًا مَا أُنْذِرَ آبَاؤُهُمْ فَهُمْ غَافِلُونَ &#1750; لَقَدْ حَقَّ القَوْلُ عَلَى أَكْثَرِهِمْ فَهُمْ لَا يُؤْمِنُونَ &#1750; إِنَّا جَعَلْنَا فِي أَعْنَاقِهِمْ أَغْلَالًا فَهِيَ إِلَى الأَذْقَانِ فَهُمْ مُقْمَحُونَ &#1750; وَجَعَلْنَا مِنْ بَيْنِ أَيْدِيهِمْ سَدًّا وَمِنْ خَلْفِهِمْ سَدًّا فَأَغْشَيْنَاهُمْ فَهُمْ لَا يُبْصِرُونَ","tl":"Yā-Sīn. Wa-l-Qurʾāni l-ḥakīm. Innaka la-mina l-mursalīn. ʿAlā ṣirāṭin mustaqīm. Tanzīla l-ʿAzīzi r-Raḥīm. Li-tundhira qawman mā undhira ābāʾuhum fa-hum ghāfilūn. La-qad ḥaqqa l-qawlu ʿalā aktharihim fa-hum lā yuʾminūn. Innā jaʿalnā fī aʿnāqihim aghlālan fa-hiya ila l-adhqāni fa-hum muqmaḥūn. Wa-jaʿalnā min bayni aydīhim saddan wa-min khalfihim saddan fa-aghshaynāhum fa-hum lā yubṣirūn."},{"ar":"شَاهَتِ الوُجُوهُ &#1750; شَاهَتِ الوُجُوهُ &#1750; شَاهَتِ الوُجُوهُ &#1750; وَعَنَتِ الوُجُوهُ لِلْحَيِّ القَيُّومِ وَقَدْ خَابَ مَنْ حَمَلَ ظُلْمًا","tl":"Shāhati l-wujūh, shāhati l-wujūh, shāhati l-wujūh; wa-ʿanati l-wujūhu li-l-Ḥayyi l-Qayyūm, wa-qad khāba man ḥamala ẓulmā."},{"ar":"طس &#1750; حم &#1750; عسق","tl":"Ṭā-Sīn. Ḥā-Mīm. ʿAyn-Sīn-Qāf."},{"ar":"مَرَجَ البَحْرَيْنِ يَلْتَقِيَانِ &#1750; بَيْنَهُمَا بَرْزَخٌ لَا يَبْغِيَانِ","tl":"Maraja l-baḥrayni yaltaqiyān, baynahumā barzakhun lā yabghiyān."},{"ar":"حم، حم، حم، حم، حم، حم، حم &#1750; حُمَّ الأَمْرُ وَجَاءَ النَّصْرُ فَعَلَيْنَا لَا يُنْصَرُونَ","tl":"Ḥā-Mīm (seven times). Ḥumma l-amru wa-jāʾa n-naṣru fa-ʿalaynā lā yunṣarūn."},{"ar":"حم &#1750; تَنْزِيلُ الكِتَابِ مِنَ اللهِ العَزِيزِ العَلِيمِ &#1750; غَافِرِ الذَّنْبِ وَقَابِلِ التَّوْبِ شَدِيدِ العِقَابِ ذِي الطَّوْلِ &#1750; لَا إِلَهَ إِلَّا هُوَ إِلَيْهِ المَصِيرُ","tl":"Ḥā-Mīm. Tanzīlu l-kitābi mina Llāhi l-ʿAzīzi l-ʿAlīm. Ghāfiri dh-dhanbi wa-qābili t-tawbi shadīdi l-ʿiqābi dhi ṭ-ṭawl. Lā ilāha illā huwa ilayhi l-maṣīr."},{"ar":"بِسْمِ اللهِ بَابُنَا &#1750; تَبَارَكَ حِيطَانُنَا &#1750; يس سَقْفُنَا &#1750; كهيعص كِفَايَتُنَا &#1750; حم عسق حِمَايَتُنَا","tl":"Bismi Llāhi bābunā, Tabāraka ḥīṭānunā, Yā-Sīn saqfunā, Kāf-Hā-Yā-ʿAyn-Ṣād kifāyatunā, Ḥā-Mīm-ʿAyn-Sīn-Qāf ḥimāyatunā."},{"ar":"فَسَيَكْفِيكَهُمُ اللهُ وَهُوَ السَّمِيعُ العَلِيمُ <span class='rep'>(ثَلَاثًا)</span>","tl":"Fa-sa-yakfīkahumu Llāhu wa-huwa s-Samīʿu l-ʿAlīm. (×3)"},{"ar":"سِتْرُ العَرْشِ مَسْبُولٌ عَلَيْنَا، وَعَيْنُ اللهِ نَاظِرَةٌ إِلَيْنَا، بِحَوْلِ اللهِ لَا يُقْدَرُ عَلَيْنَا","tl":"Sitru l-ʿarshi masbūlun ʿalaynā, wa-ʿaynu Llāhi nāẓiratun ilaynā, bi-ḥawli Llāhi lā yuqdaru ʿalaynā."},{"ar":"وَاللهُ مِنْ وَرَائِهِمْ مُحِيطٌ &#1750; بَلْ هُوَ قُرْآنٌ مَجِيدٌ &#1750; فِي لَوْحٍ مَحْفُوظٍ <span class='rep'>(ثَلَاثًا)</span>","tl":"Wa-Llāhu min warāʾihim muḥīṭ. Bal huwa qurʾānun majīd. Fī lawḥin maḥfūẓ. (×3)"},{"ar":"فَاللهُ خَيْرٌ حَافِظًا وَهُوَ أَرْحَمُ الرَّاحِمِينَ <span class='rep'>(ثَلَاثًا)</span>","tl":"Fa-Llāhu khayrun ḥāfiẓan wa-huwa arḥamu r-rāḥimīn. (×3)"},{"ar":"إِنَّ وَلِيِّيَ اللهُ الَّذِي نَزَّلَ الكِتَابَ وَهُوَ يَتَوَلَّى الصَّالِحِينَ <span class='rep'>(ثَلَاثًا)</span>","tl":"Inna waliyyiya Llāhu lladhī nazzala l-kitāba wa-huwa yatawalla ṣ-ṣāliḥīn. (×3)"},{"ar":"حَسْبِيَ اللهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ العَرْشِ العَظِيمِ <span class='rep'>(ثَلَاثًا)</span>","tl":"Ḥasbiya Llāhu lā ilāha illā huwa ʿalayhi tawakkaltu wa-huwa Rabbu l-ʿarshi l-ʿaẓīm. (×3)"},{"ar":"بِسْمِ اللهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ العَلِيمُ <span class='rep'>(ثَلَاثًا)</span>","tl":"Bismi Llāhi lladhī lā yaḍurru maʿa smihi shayʾun fi l-arḍi wa-lā fi s-samāʾi wa-huwa s-Samīʿu l-ʿAlīm. (×3)"},{"ar":"وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ العَلِيِّ العَظِيمِ","tl":"Wa-lā ḥawla wa-lā quwwata illā bi-Llāhi l-ʿAliyyi l-ʿAẓīm."},{"ar":"وَصَلَّى اللهُ عَلَى سَيِّدِنَا مُحَمَّدٍ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلَّمَ","tl":"Wa-ṣalla Llāhu ʿalā sayyidinā Muḥammadin wa-ʿalā ālihi wa-ṣaḥbihi wa-sallam."}]};
const BAHR_INTRO={"en":"<p>The sea-litany of Imām al-Shādhilī — a reading of protection and of pressing need (<i>ḥāja</i>). It carries no station for eyesight; bring your own need to it, read it once, customarily after ʿAṣr.</p>","ar":"<p>حزبُ الإمام الشاذلي — قراءةُ تحصينٍ وحاجةٍ ملحّة. لا مقصد فيه للبصر؛ احمل حاجتك أنت، واقرأه مرةً، والعادة بعد العصر.</p>","tr":"<p>İmam Şâzelî’nin deniz hizbi — bir tahsin ve acil hâcet okuyuşu. Göze özgü bir makamı yoktur; kendi hâcetini getir, bir kez oku, âdet üzere ikindiden sonra.</p>"};

   {n:8, ar:"إِنَّا جَعَلْنَا فِىٓ أَعْنَـٰقِهِمْ أَغْلَـٰلًا فَهِىَ إِلَى ٱلْأَذْقَانِ فَهُم مُّقْمَحُونَ"},
   {n:9, ar:"وَجَعَلْنَا مِنۢ بَيْنِ أَيْدِيهِمْ سَدًّا وَمِنْ خَلْفِهِمْ سَدًّا فَأَغْشَيْنَـٰهُمْ فَهُمْ لَا يُبْصِرُونَ"},
   {n:10, ar:"وَسَوَآءٌ عَلَيْهِمْ ءَأَنذَرْتَهُمْ أَمْ لَمْ تُنذِرْهُمْ لَا يُؤْمِنُونَ"},
   {n:11, ar:"إِنَّمَا تُنذِرُ مَنِ ٱتَّبَعَ ٱلذِّكْرَ وَخَشِىَ ٱلرَّحْمَـٰنَ بِٱلْغَيْبِ ۖ فَبَشِّرْهُ بِمَغْفِرَةٍ وَأَجْرٍ كَرِيمٍ"},
   {n:12, ar:"إِنَّا نَحْنُ نُحْىِ ٱلْمَوْتَىٰ وَنَكْتُبُ مَا قَدَّمُوا۟ وَءَاثَـٰرَهُمْ ۚ وَكُلَّ شَىْءٍ أَحْصَيْنَـٰهُ فِىٓ إِمَامٍ مُّبِينٍ"},
   {n:13, ar:"وَٱضْرِبْ لَهُم مَّثَلًا أَصْحَـٰبَ ٱلْقَرْيَةِ إِذْ جَآءَهَا ٱلْمُرْسَلُونَ"},
   {n:14, ar:"إِذْ أَرْسَلْنَآ إِلَيْهِمُ ٱثْنَيْنِ فَكَذَّبُوهُمَا فَعَزَّزْنَا بِثَالِثٍ فَقَالُوٓا۟ إِنَّآ إِلَيْكُم مُّرْسَلُونَ"},
   {n:15, ar:"قَالُوا۟ مَآ أَنتُمْ إِلَّا بَشَرٌ مِّثْلُنَا وَمَآ أَنزَلَ ٱلرَّحْمَـٰنُ مِن شَىْءٍ إِنْ أَنتُمْ إِلَّا تَكْذِبُونَ"},
   {n:16, ar:"قَالُوا۟ رَبُّنَا يَعْلَمُ إِنَّآ إِلَيْكُمْ لَمُرْسَلُونَ"},
   {n:17, ar:"وَمَا عَلَيْنَآ إِلَّا ٱلْبَلَـٰغُ ٱلْمُبِينُ"},
   {n:18, ar:"قَالُوٓا۟ إِنَّا تَطَيَّرْنَا بِكُمْ ۖ لَئِن لَّمْ تَنتَهُوا۟ لَنَرْجُمَنَّكُمْ وَلَيَمَسَّنَّكُم مِّنَّا عَذَابٌ أَلِيمٌ"},
   {n:19, ar:"قَالُوا۟ طَـٰٓئِرُكُم مَّعَكُمْ ۚ أَئِن ذُكِّرْتُم ۚ بَلْ أَنتُمْ قَوْمٌ مُّسْرِفُونَ"},
   {n:20, ar:"وَجَآءَ مِنْ أَقْصَا ٱلْمَدِينَةِ رَجُلٌ يَسْعَىٰ قَالَ يَـٰقَوْمِ ٱتَّبِعُوا۟ ٱلْمُرْسَلِينَ"},
   {n:21, ar:"ٱتَّبِعُوا۟ مَن لَّا يَسْـَٔلُكُمْ أَجْرًا وَهُم مُّهْتَدُونَ"},
   {n:22, ar:"وَمَا لِىَ لَآ أَعْبُدُ ٱلَّذِى فَطَرَنِى وَإِلَيْهِ تُرْجَعُونَ"},
   {n:23, ar:"ءَأَتَّخِذُ مِن دُونِهِۦٓ ءَالِهَةً إِن يُرِدْنِ ٱلرَّحْمَـٰنُ بِضُرٍّ لَّا تُغْنِ عَنِّى شَفَـٰعَتُهُمْ شَيْـًٔا وَلَا يُنقِذُونِ"},
   {n:24, ar:"إِنِّىٓ إِذًا لَّفِى ضَلَـٰلٍ مُّبِينٍ"},
   {n:25, ar:"إِنِّىٓ ءَامَنتُ بِرَبِّكُمْ فَٱسْمَعُونِ"},
   {n:26, ar:"قِيلَ ٱدْخُلِ ٱلْجَنَّةَ ۖ قَالَ يَـٰلَيْتَ قَوْمِى يَعْلَمُونَ"},
   {n:27, ar:"بِمَا غَفَرَ لِى رَبِّى وَجَعَلَنِى مِنَ ٱلْمُكْرَمِينَ"},
   {n:28, ar:"وَمَآ أَنزَلْنَا عَلَىٰ قَوْمِهِۦ مِنۢ بَعْدِهِۦ مِن جُندٍ مِّنَ ٱلسَّمَآءِ وَمَا كُنَّا مُنزِلِينَ"},
   {n:29, ar:"إِن كَانَتْ إِلَّا صَيْحَةً وَٰحِدَةً فَإِذَا هُمْ خَـٰمِدُونَ"},
   {n:30, ar:"يَـٰحَسْرَةً عَلَى ٱلْعِبَادِ ۚ مَا يَأْتِيهِم مِّن رَّسُولٍ إِلَّا كَانُوا۟ بِهِۦ يَسْتَهْزِءُونَ"},
   {n:31, ar:"أَلَمْ يَرَوْا۟ كَمْ أَهْلَكْنَا قَبْلَهُم مِّنَ ٱلْقُرُونِ أَنَّهُمْ إِلَيْهِمْ لَا يَرْجِعُونَ"},
   {n:32, ar:"وَإِن كُلٌّ لَّمَّا جَمِيعٌ لَّدَيْنَا مُحْضَرُونَ"},
   {n:33, ar:"وَءَايَةٌ لَّهُمُ ٱلْأَرْضُ ٱلْمَيْتَةُ أَحْيَيْنَـٰهَا وَأَخْرَجْنَا مِنْهَا حَبًّا فَمِنْهُ يَأْكُلُونَ"},
   {n:34, ar:"وَجَعَلْنَا فِيهَا جَنَّـٰتٍ مِّن نَّخِيلٍ وَأَعْنَـٰبٍ وَفَجَّرْنَا فِيهَا مِنَ ٱلْعُيُونِ"},
   {n:35, ar:"لِيَأْكُلُوا۟ مِن ثَمَرِهِۦ وَمَا عَمِلَتْهُ أَيْدِيهِمْ ۖ أَفَلَا يَشْكُرُونَ"},
   {n:36, ar:"سُبْحَـٰنَ ٱلَّذِى خَلَقَ ٱلْأَزْوَٰجَ كُلَّهَا مِمَّا تُنۢبِتُ ٱلْأَرْضُ وَمِنْ أَنفُسِهِمْ وَمِمَّا لَا يَعْلَمُونَ"},
   {n:37, ar:"وَءَايَةٌ لَّهُمُ ٱلَّيْلُ نَسْلَخُ مِنْهُ ٱلنَّهَارَ فَإِذَا هُم مُّظْلِمُونَ"},
   {n:38, ar:"وَٱلشَّمْسُ تَجْرِى لِمُسْتَقَرٍّ لَّهَا ۚ ذَٰلِكَ تَقْدِيرُ ٱلْعَزِيزِ ٱلْعَلِيمِ"},
   {n:39, ar:"وَٱلْقَمَرَ قَدَّرْنَـٰهُ مَنَازِلَ حَتَّىٰ عَادَ كَٱلْعُرْجُونِ ٱلْقَدِيمِ"},
   {n:40, ar:"لَا ٱلشَّمْسُ يَنۢبَغِى لَهَآ أَن تُدْرِكَ ٱلْقَمَرَ وَلَا ٱلَّيْلُ سَابِقُ ٱلنَّهَارِ ۚ وَكُلٌّ فِى فَلَكٍ يَسْبَحُونَ"},
   {n:41, ar:"وَءَايَةٌ لَّهُمْ أَنَّا حَمَلْنَا ذُرِّيَّتَهُمْ فِى ٱلْفُلْكِ ٱلْمَشْحُونِ"},
   {n:42, ar:"وَخَلَقْنَا لَهُم مِّن مِّثْلِهِۦ مَا يَرْكَبُونَ"},
   {n:43, ar:"وَإِن نَّشَأْ نُغْرِقْهُمْ فَلَا صَرِيخَ لَهُمْ وَلَا هُمْ يُنقَذُونَ"},
   {n:44, ar:"إِلَّا رَحْمَةً مِّنَّا وَمَتَـٰعًا إِلَىٰ حِينٍ"},
   {n:45, ar:"وَإِذَا قِيلَ لَهُمُ ٱتَّقُوا۟ مَا بَيْنَ أَيْدِيكُمْ وَمَا خَلْفَكُمْ لَعَلَّكُمْ تُرْحَمُونَ"},
   {n:46, ar:"وَمَا تَأْتِيهِم مِّنْ ءَايَةٍ مِّنْ ءَايَـٰتِ رَبِّهِمْ إِلَّا كَانُوا۟ عَنْهَا مُعْرِضِينَ"},
   {n:47, ar:"وَإِذَا قِيلَ لَهُمْ أَنفِقُوا۟ مِمَّا رَزَقَكُمُ ٱللَّهُ قَالَ ٱلَّذِينَ كَفَرُوا۟ لِلَّذِينَ ءَامَنُوٓا۟ أَنُطْعِمُ مَن لَّوْ يَشَآءُ ٱللَّهُ أَطْعَمَهُۥٓ إِنْ أَنتُمْ إِلَّا فِى ضَلَـٰلٍ مُّبِينٍ"},
   {n:48, ar:"وَيَقُولُونَ مَتَىٰ هَـٰذَا ٱلْوَعْدُ إِن كُنتُمْ صَـٰدِقِينَ"},
   {n:49, ar:"مَا يَنظُرُونَ إِلَّا صَيْحَةً وَٰحِدَةً تَأْخُذُهُمْ وَهُمْ يَخِصِّمُونَ"},
   {n:50, ar:"فَلَا يَسْتَطِيعُونَ تَوْصِيَةً وَلَآ إِلَىٰٓ أَهْلِهِمْ يَرْجِعُونَ"},
   {n:51, ar:"وَنُفِخَ فِى ٱلصُّورِ فَإِذَا هُم مِّنَ ٱلْأَجْدَاثِ إِلَىٰ رَبِّهِمْ يَنسِلُونَ"},
   {n:52, ar:"قَالُوا۟ يَـٰوَيْلَنَا مَنۢ بَعَثَنَا مِن مَّرْقَدِنَا ۜ ۗ هَـٰذَا مَا وَعَدَ ٱلرَّحْمَـٰنُ وَصَدَقَ ٱلْمُرْسَلُونَ"},
   {n:53, ar:"إِن كَانَتْ إِلَّا صَيْحَةً وَٰحِدَةً فَإِذَا هُمْ جَمِيعٌ لَّدَيْنَا مُحْضَرُونَ"},
   {n:54, ar:"فَٱلْيَوْمَ لَا تُظْلَمُ نَفْسٌ شَيْـًٔا وَلَا تُجْزَوْنَ إِلَّا مَا كُنتُمْ تَعْمَلُونَ"},
   {n:55, ar:"إِنَّ أَصْحَـٰبَ ٱلْجَنَّةِ ٱلْيَوْمَ فِى شُغُلٍ فَـٰكِهُونَ"},
   {n:56, ar:"هُمْ وَأَزْوَٰجُهُمْ فِى ظِلَـٰلٍ عَلَى ٱلْأَرَآئِكِ مُتَّكِـُٔونَ"},
   {n:57, ar:"لَهُمْ فِيهَا فَـٰكِهَةٌ وَلَهُم مَّا يَدَّعُونَ"},
   {n:58, ar:"سَلَـٰمٌ قَوْلًا مِّن رَّبٍّ رَّحِيمٍ"},
   {n:59, ar:"وَٱمْتَـٰزُوا۟ ٱلْيَوْمَ أَيُّهَا ٱلْمُجْرِمُونَ"},
   {n:60, ar:"۞ أَلَمْ أَعْهَدْ إِلَيْكُمْ يَـٰبَنِىٓ ءَادَمَ أَن لَّا تَعْبُدُوا۟ ٱلشَّيْطَـٰنَ ۖ إِنَّهُۥ لَكُمْ عَدُوٌّ مُّبِينٌ"},
   {n:61, ar:"وَأَنِ ٱعْبُدُونِى ۚ هَـٰذَا صِرَٰطٌ مُّسْتَقِيمٌ"},
   {n:62, ar:"وَلَقَدْ أَضَلَّ مِنكُمْ جِبِلًّا كَثِيرًا ۖ أَفَلَمْ تَكُونُوا۟ تَعْقِلُونَ"},
   {n:63, ar:"هَـٰذِهِۦ جَهَنَّمُ ٱلَّتِى كُنتُمْ تُوعَدُونَ"},
   {n:64, ar:"ٱصْلَوْهَا ٱلْيَوْمَ بِمَا كُنتُمْ تَكْفُرُونَ"},
   {n:65, ar:"ٱلْيَوْمَ نَخْتِمُ عَلَىٰٓ أَفْوَٰهِهِمْ وَتُكَلِّمُنَآ أَيْدِيهِمْ وَتَشْهَدُ أَرْجُلُهُم بِمَا كَانُوا۟ يَكْسِبُونَ"},
   {n:66, ar:"وَلَوْ نَشَآءُ لَطَمَسْنَا عَلَىٰٓ أَعْيُنِهِمْ فَٱسْتَبَقُوا۟ ٱلصِّرَٰطَ فَأَنَّىٰ يُبْصِرُونَ"},
   {n:67, ar:"وَلَوْ نَشَآءُ لَمَسَخْنَـٰهُمْ عَلَىٰ مَكَانَتِهِمْ فَمَا ٱسْتَطَـٰعُوا۟ مُضِيًّا وَلَا يَرْجِعُونَ"},
   {n:68, ar:"وَمَن نُّعَمِّرْهُ نُنَكِّسْهُ فِى ٱلْخَلْقِ ۖ أَفَلَا يَعْقِلُونَ"},
   {n:69, ar:"وَمَا عَلَّمْنَـٰهُ ٱلشِّعْرَ وَمَا يَنۢبَغِى لَهُۥٓ ۚ إِنْ هُوَ إِلَّا ذِكْرٌ وَقُرْءَانٌ مُّبِينٌ"},
   {n:70, ar:"لِّيُنذِرَ مَن كَانَ حَيًّا وَيَحِقَّ ٱلْقَوْلُ عَلَى ٱلْكَـٰفِرِينَ"},
   {n:71, ar:"أَوَلَمْ يَرَوْا۟ أَنَّا خَلَقْنَا لَهُم مِّمَّا عَمِلَتْ أَيْدِينَآ أَنْعَـٰمًا فَهُمْ لَهَا مَـٰلِكُونَ"},
   {n:72, ar:"وَذَلَّلْنَـٰهَا لَهُمْ فَمِنْهَا رَكُوبُهُمْ وَمِنْهَا يَأْكُلُونَ"},
   {n:73, ar:"وَلَهُمْ فِيهَا مَنَـٰفِعُ وَمَشَارِبُ ۖ أَفَلَا يَشْكُرُونَ"},
   {n:74, ar:"وَٱتَّخَذُوا۟ مِن دُونِ ٱللَّهِ ءَالِهَةً لَّعَلَّهُمْ يُنصَرُونَ"},
   {n:75, ar:"لَا يَسْتَطِيعُونَ نَصْرَهُمْ وَهُمْ لَهُمْ جُندٌ مُّحْضَرُونَ"},
   {n:76, ar:"فَلَا يَحْزُنكَ قَوْلُهُمْ ۘ إِنَّا نَعْلَمُ مَا يُسِرُّونَ وَمَا يُعْلِنُونَ"},
   {n:77, ar:"أَوَلَمْ يَرَ ٱلْإِنسَـٰنُ أَنَّا خَلَقْنَـٰهُ مِن نُّطْفَةٍ فَإِذَا هُوَ خَصِيمٌ مُّبِينٌ"},
   {n:78, ar:"وَضَرَبَ لَنَا مَثَلًا وَنَسِىَ خَلْقَهُۥ ۖ قَالَ مَن يُحْىِ ٱلْعِظَـٰمَ وَهِىَ رَمِيمٌ"},
   {n:79, ar:"قُلْ يُحْيِيهَا ٱلَّذِىٓ أَنشَأَهَآ أَوَّلَ مَرَّةٍ ۖ وَهُوَ بِكُلِّ خَلْقٍ عَلِيمٌ"},
   {n:80, ar:"ٱلَّذِى جَعَلَ لَكُم مِّنَ ٱلشَّجَرِ ٱلْأَخْضَرِ نَارًا فَإِذَآ أَنتُم مِّنْهُ تُوقِدُونَ"},
   {n:81, ar:"أَوَلَيْسَ ٱلَّذِى خَلَقَ ٱلسَّمَـٰوَٰتِ وَٱلْأَرْضَ بِقَـٰدِرٍ عَلَىٰٓ أَن يَخْلُقَ مِثْلَهُم ۚ بَلَىٰ وَهُوَ ٱلْخَلَّـٰقُ ٱلْعَلِيمُ"},
   {n:82, ar:"إِنَّمَآ أَمْرُهُۥٓ إِذَآ أَرَادَ شَيْـًٔا أَن يَقُولَ لَهُۥ كُن فَيَكُونُ"},
   {n:83, ar:"فَسُبْحَـٰنَ ٱلَّذِى بِيَدِهِۦ مَلَكُوتُ كُلِّ شَىْءٍ وَإِلَيْهِ تُرْجَعُونَ"},
  ]
};

/* ---------- navigation: internal stack + hardware back + edge swipe ---------- */
let navstack=[{t:"view",v:"today"}], histOK=true, readScroll={};

function applyLoc(){
  const l=loc(), v=(l.t==="prog")?"programs":l.v;

  if(l.v==="yasin"||l.v==="bahr"){ const y=readScroll[l.v]||0; requestAnimationFrame(()=>window.scrollTo({top:y})); }

/* remember where you were in a reading */
window.addEventListener("scroll",()=>{ const l=loc(); if(l&&(l.v==="yasin"||l.v==="bahr")) readScroll[l.v]=window.scrollY; },{passive:true});
function go(v){
  /* each bottom-nav tab is its own root — no back arrow on a top-level view */
  navstack = [{t:"view",v}];
  applyLoc();
}
function openProgram(id){ navstack.push({t:"prog",id}); applyLoc(); }
function openView(v){ navstack.push({t:"view",v}); applyLoc(); }
function navBack(){
  if($("csheet").classList.contains("on")){ closeCsheet(); return; }
  if(navstack.length>1){ navstack.pop(); applyLoc(); }          /* drilled in -> pop */
  else if(loc().v!=="today"){ navstack=[{t:"view",v:"today"}]; applyLoc(); }  /* root tab -> today */
}
function armHistory(){
  try{ history.pushState({b:1},""); }catch(e){ histOK=false; }
  window.addEventListener("popstate",()=>{ navBack(); if(histOK) try{ history.pushState({b:1},""); }catch(e){} });
}
(function(){ /* edge swipe = back */
  let t0=null;
  document.addEventListener("touchstart",e=>{
    const t=e.touches[0], rtl=document.documentElement.dir==="rtl";
    const edge = rtl ? (t.clientX>window.innerWidth-30) : (t.clientX<30);
    t0 = edge ? {x:t.clientX,y:t.clientY} : null;
  },{passive:true});
  document.addEventListener("touchend",e=>{
    if(!t0) return;
    const t=e.changedTouches[0], dx=t.clientX-t0.x, dy=Math.abs(t.clientY-t0.y);
    const rtl=document.documentElement.dir==="rtl";
    if(dy<70 && (rtl ? dx<-64 : dx>64)) navBack();
    t0=null;
  },{passive:true});
})();

function allCoreDone(pid){
  const p=PROGRAMS.find(x=>x.id===pid), st=stateOf(pid); if(!p||!st) return false;
  const core=p.steps.filter(s=>!s.opt);
  return core.length>0 && core.every(s=>st[s.k]);
}
function stepTap(pid,key){
  const state=stateOf(pid); if(!state) return;
  state[key]=!state[key];
  buzz(8); if(state[key]) tick();
  /* completing the day's practice records the streak automatically */
  if((pid==="daily"||pid==="masters") && allCoreDone(pid) && !prog.ist.days[today()]){ prog.ist.days[today()]=1; buzz([25,50,25]); tick(true); toast(T("recorded")); }
  store.save(); renderProgramBody(pid);
}
function finishDay(){ prog.ist.days[today()]=1; store.save(); toast(T("recorded")); updateDayNote(); }
function updateDayNote(){ const n=$("daynote"); if(!n) return; n.textContent=`${T("days_rec")}: ${Object.keys(prog.ist.days).length} · ${T("streak")}: ${streak()}`; }
function today(){ return new Date().toLocaleDateString("en-CA"); }
/* streak counts consecutive recorded days; today un-kept is "pending", not a break —
   only a genuinely missed day (yesterday onward) ends the run */
function streak(){ let n=0; const d=new Date(); if(!prog.ist.days[today()]) d.setDate(d.getDate()-1); for(;;){ const k=d.toLocaleDateString("en-CA"); if(prog.ist.days[k]){n++; d.setDate(d.getDate()-1);} else break;} return n; }

  clearTimeout(istReset._t); istArmed=false; prog.ist.days={}; store.save(); renderProgramBody("istiqama");
}
/* ---------- constancy report (calendar of kept days) ---------- */
function longestStreak(){
  const keys=Object.keys(prog.ist.days).sort();
  if(!keys.length) return 0;
  let best=1,cur=1;
  for(let i=1;i<keys.length;i++){
    const p=keys[i-1].split("-").map(Number), prev=new Date(p[0],p[1]-1,p[2]); prev.setDate(prev.getDate()+1);
    if(prev.toLocaleDateString("en-CA")===keys[i]){ cur++; if(cur>best) best=cur; } else cur=1;
  }
  return best;
}
function renderReport(){
  const lc={en:"en",ar:"ar",tr:"tr"}[lang]||"en";
  const days=prog.ist.days, keys=Object.keys(days);
  const dg=lang==="ar"?arNum:(x=>String(x));
  const nowKey=today(), thisYm=nowKey.slice(0,7);
  const monthCount=keys.filter(k=>k.slice(0,7)===thisYm).length;
  let h=`<div class="statgrid">
    <div class="stat"><div class="sv">${dg(streak())}</div><div class="sl">${T("r_current")}</div></div>
    <div class="stat"><div class="sv">${dg(longestStreak())}</div><div class="sl">${T("r_longest")}</div></div>
    <div class="stat"><div class="sv">${dg(keys.length)}</div><div class="sl">${T("r_total")}</div></div>
    <div class="stat"><div class="sv">${dg(monthCount)}</div><div class="sl">${T("r_month")}</div></div>
  </div>`;
  let wh="";
  for(let i=0;i<7;i++){ wh+=`<div>${new Intl.DateTimeFormat(lc,{weekday:"narrow"}).format(new Date(2024,0,1+i))}</div>`; }
  const stopYm = keys.length ? keys.reduce((a,b)=>a<b?a:b).slice(0,7) : thisYm;
  const now=new Date(); let cursor=new Date(now.getFullYear(),now.getMonth(),1), guard=0;
  while(guard<12){
    const y=cursor.getFullYear(), mo=cursor.getMonth(), ym=`${y}-${String(mo+1).padStart(2,"0")}`;
    const first=new Date(y,mo,1), offset=(first.getDay()+6)%7, dim=new Date(y,mo+1,0).getDate();
    const kept=keys.filter(k=>k.slice(0,7)===ym).length;
    const title=dg(new Intl.DateTimeFormat(lc,{month:"long",year:"numeric"}).format(first));
    let cells="";
    for(let b=0;b<offset;b++) cells+=`<div class="blank"></div>`;
    for(let d=1;d<=dim;d++){ const key=`${ym}-${String(d).padStart(2,"0")}`;
      cells+=`<div class="${days[key]?"kept":""}${key===nowKey?" today":""}">${dg(d)}</div>`; }
    h+=`<div class="trk calmo"><div class="calmo-h"><h3 style="margin:0">${title}</h3><span class="calmo-n">${dg(kept)} ${T("days")}</span></div>
      <div class="calhead">${wh}</div><div class="calgrid">${cells}</div></div>`;
    if(ym===stopYm) break;
    cursor.setMonth(cursor.getMonth()-1); guard++;
  }
  if(!keys.length) h+=`<p class="pnote">${T("r_none")}</p>`;
  h+=`<button class="bigbtn ghost" onclick="navBack()">${T("back")}</button>`;
  $("reportbody").innerHTML=h;
}

function drawCounter(){
  const t=mainCounter.target, n=mainCounter.n;
  const disp = n===0 ? 0 : ((n-1)%t)+1;      /* 1..t, then rolls to 1 */
  const rounds = Math.floor(n/t);
  const justDone = n>0 && n%t===0;
  const C=2*Math.PI*100, frac= n===0 ? 0 : disp/t;
  const dg=lang==="ar"?arNum:(x=>String(x));
  const ring=$("mainring");
  ring.querySelector(".prog").style.strokeDashoffset=(C*(1-frac)).toFixed(1);
  $("mcnt").textContent=dg(disp);
  $("mtgt").textContent=T("of")+" "+dg(t);
  ring.classList.toggle("done", justDone);
  const parts=[];
  if(rounds>0) parts.push(`${T("rounds")}: ${dg(rounds)}`);
  if(n>0) parts.push(`${T("total")}: ${dg(n)}`);
  $("roundnote").textContent=parts.join("  ·  ");
}
function counterTap(){
  mainCounter.n++;
  const t=mainCounter.target, n=mainCounter.n, dg=lang==="ar"?arNum:(x=>String(x));
  if(n%t===0){ buzz([22,45,22]); tick(true); toast(`${dg(t)} ${T("complete")}  ·  ${T("rounds")}: ${dg(n/t)}`); }
  else { buzz(8); tick(); }
  drawCounter(); store.save();
}
function counterReset(){ mainCounter.n=0; store.save(); drawCounter(); }
function setTarget(n){ mainCounter.target=n; mainCounter.n=0; store.save(); renderCounter(); }
function setCustom(){ const v=parseInt($("custN").value,10); if(v>0){mainCounter.target=v; mainCounter.n=0; store.save(); renderCounter();} }

/* ---------- feedback (sound / vibrate / off) ---------- */
let actx=null;
function tick(done){
  if(fbMode!=="sound") return;
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==="suspended") actx.resume();
    const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();
    o.type="sine"; o.frequency.value=done?660:1320;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(done?0.15:0.08,t+0.006);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(done?0.3:0.055));
    o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+(done?0.35:0.07));
  }catch(e){}
}
function updateFbBtn(){ document.querySelectorAll(".fbb").forEach(b=>b.textContent=T("fb_"+fbMode)); }
function cycleFeedback(){
  fbMode = fbMode==="vibrate" ? "sound" : fbMode==="sound" ? "off" : "vibrate";
  updateFbBtn(); store.save();
  if(fbMode==="sound") tick(); else if(fbMode==="vibrate") buzz(14);
}

/* ---------- hijri ---------- */
function renderHijri(){
  const el=$("hijri"); if(!el) return;
  const locale={en:"en-u-ca-islamic-umalqura", ar:"ar-SA-u-ca-islamic-umalqura", tr:"tr-u-ca-islamic-umalqura"}[lang];
  try{ el.textContent=new Intl.DateTimeFormat(locale,{day:"numeric",month:"long",year:"numeric"}).format(new Date()); }
  catch(e){ el.textContent=""; }
}

/* ---------- Today (dashboard) ---------- */
function progOf(pid){
  const p=PROGRAMS.find(x=>x.id===pid); if(!p||!p.steps) return {done:0,total:0};
  const st=stateOf(pid), core=p.steps.filter(s=>!s.opt);
  const done=st?core.filter(s=>st[s.k]).length:0;
  return {done, total:core.length};
}
function dailyProgress(){ return progOf("daily"); }
function renderToday(){
  const dp=dailyProgress(), bp=progOf("banuri"), s=streak(), recd=!!prog.ist.days[today()];
  const bpName=PG9(PROGRAMS.find(x=>x.id==="banuri")).nm;
  const pct=dp.total?Math.round(dp.done/dp.total*100):0;
  const bpct=bp.total?Math.round(bp.done/bp.total*100):0;
  const daysRec=Object.keys(prog.ist.days).length, tgt=prog.ist.target;
  const dg=lang==="ar"?arNum:(x=>String(x));
  let h=`
    <div class="thead">
      <div class="tbism ar">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
      <div class="hijri" id="hijri"></div>
    </div>
    <div class="daykept ${recd?'kept':''}">${recd?T("day_kept"):T("day_pending")}</div>
    <div class="tcard hero ${recd?'done':''}" onclick="openProgram('daily')">
      <div class="tc-row"><div class="tc-title">${T("today_wird")}</div>
        <svg class="i chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
      <div class="tc-sub">${recd?T("wird_done"):`${dg(dp.done)} ${T("of")} ${dg(dp.total)}`}</div>
      <div class="pbar"><div class="pfill" style="width:${recd?100:pct}%"></div></div>
    </div>
    <div class="tcard" onclick="openProgram('banuri')">
      <div class="tc-row"><div class="tc-title">${bpName}</div>
        <svg class="i chev" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
      <div class="tc-sub">${dg(bp.done)} ${T("of")} ${dg(bp.total)}</div>
      <div class="pbar"><div class="pfill" style="width:${bpct}%"></div></div>
    </div>
    <div class="statgrid">
      <div class="stat"><div class="sv">${dg(s)}</div><div class="sl">${T("day_streak")}</div></div>
      <div class="stat"><div class="sv">${dg(daysRec)}${tgt?`<span class="of">/${dg(tgt)}</span>`:''}</div><div class="sl">${tgt?T("toward_commit"):T("days_rec")}</div></div>
    </div>
    <div class="epigraph">
      <div class="ar">وَاجْعَلْ فِي بَصَرِي نُورًا</div>
      <div class="who">${T("epigraph_who")}</div>
    </div>`;
  $("todaybody").innerHTML=h;
  renderHijri();
}

/* ---------- About & Safety (settings + the sources/rules/safety) ---------- */
function renderAbout(){
  const dark=document.documentElement.getAttribute("data-theme")==="dark";
  const settings=`<div class="settings">
    <div class="setrow"><span class="setl">${T("text_size")}</span>
      <div class="seg"><button onclick="uzoom(-1);renderAbout()">A−</button><button onclick="uzoom(1);renderAbout()">A+</button></div></div>
    <div class="setrow"><span class="setl">${T("theme_label")}</span>
      <button class="smallbtn" onclick="toggleTheme();renderAbout()">${dark?T("theme_light"):T("theme_dark")}</button></div>
    <div class="setrow"><span class="setl">${T("intro_label")}</span>
      <button class="smallbtn" onclick="showWelcome()">${T("intro_show")}</button></div>
  </div>`;
  $("aboutbody").innerHTML=settings+(LEARN[lang]||LEARN.en);
}

/* ---------- welcome (first run) — a rotating phrase ---------- */
let seen=false;
function setWphrase(){ const el=$("wphrase"); if(el && typeof WELCOME_PHRASES!=="undefined") el.textContent=WELCOME_PHRASES[Math.floor(Math.random()*WELCOME_PHRASES.length)]; }
function refreshWelcome(){ if(!seen) setWphrase(); $("welcome").classList.toggle("show", !seen); }
function showWelcome(){ setWphrase(); $("welcome").classList.add("show"); }
function beginApp(){ seen=true; store.save(); $("welcome").classList.remove("show"); }

/* ---------- boot ---------- */
function boot(){
  LEARN.en=LEARN_HTML;
  const saved=store.load();
  if(saved){ prog=Object.assign(prog,saved); prog.ist=Object.assign({target:0,days:{}},saved.ist||{}); if(saved._lang&&UI[saved._lang]) lang=saved._lang; if(saved._fb) fbMode=saved._fb; if(saved._seen) seen=true; if(Array.isArray(saved._custom)) customDuas=saved._custom; }
  applyLang();
  applyLoc();
  armHistory();
  refreshWelcome();
}
boot();

/* ================= DOWNLOAD EDITION — persistence (progress · language · feedback · welcome · custom · day-scope) ================= */
(function(){
  let ok=false; try{ localStorage.setItem("bsr_t","1"); localStorage.removeItem("bsr_t"); ok=true; }catch(e){}
  if(!ok) return;
  store.load=function(){ try{ return JSON.parse(localStorage.getItem("basira1")||"null"); }catch(e){ return null; } };
  store.save=function(){ try{ localStorage.setItem("basira1", JSON.stringify(Object.assign({},prog,{_lang:lang,_fb:fbMode,_day:today(),_seen:seen,_custom:customDuas,_cSel:cSel,_ctarget:mainCounter.target,_cn:mainCounter.n}))); }catch(e){} };
  const saved=store.load();
  if(saved){
    /* a new day clears the daily checklists — the streak history is kept */
    if(saved._day && saved._day!==today()){ saved.daily={}; saved.banuri={}; saved.masters={}; saved.dist={}; }
    prog=Object.assign(prog,saved);
    prog.ist=Object.assign({target:0,days:{}},saved.ist||{});
    delete prog._lang; delete prog._fb; delete prog._day; delete prog._seen; delete prog._custom;
    if(saved._lang&&UI[saved._lang]) lang=saved._lang;
    if(saved._fb) fbMode=saved._fb;
    if(saved._seen) seen=true;
    if(Array.isArray(saved._custom)) customDuas=saved._custom;
    if(saved._cSel) cSel=saved._cSel;
    if(saved._ctarget) mainCounter.target=saved._ctarget;
    if(typeof saved._cn==="number") mainCounter.n=saved._cn;
    delete prog._cSel; delete prog._ctarget; delete prog._cn;
    applyLang();
    refreshWelcome();
  }
})();

</script>
